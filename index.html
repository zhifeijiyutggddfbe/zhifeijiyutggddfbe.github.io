<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>PVZ 完整贴图版</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #game-wrapper { position: relative; width: 900px; height: 600px; margin: 10px auto; background: #4caf50; border: 4px solid #3e2723; }
        
        /* 菜单层：现在默认显示，不再等待初始化 */
        #menu-layer { position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn { padding: 15px 50px; margin: 15px; font-size: 24px; cursor: pointer; background: #4e342e; color: #fff; border: 3px solid #ffee00; border-radius: 10px; }
        
        #toolbar { position: absolute; top: 10px; left: 10px; display: flex; gap: 5px; background: rgba(0,0,0,0.5); padding: 5px; z-index: 10; }
        .card { width: 65px; height: 90px; background: #333; border: 2px solid #666; cursor: pointer; text-align: center; font-size: 12px; }
        .card.active { border-color: #ff0; box-shadow: 0 0 10px #ff0; }
        .card img { width: 45px; height: 45px; display: block; margin: 4px auto; }
        
        #sun-val { position: absolute; top: 15px; right: 20px; font-size: 32px; color: #ff0; font-weight: bold; text-shadow: 2px 2px #000; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="menu-layer">
        <h1 style="color:#ffee00; font-size: 40px;">植物大战僵尸</h1>
        <div class="btn" onclick="start('normal')">普通模式</div>
        <div class="btn" onclick="start('mod')" style="color:#ff3131; border-color:#ff3131;">外挂模式 (无限阳光)</div>
    </div>

    <div id="toolbar">
        <div class="card active" onclick="sel('gatling', this, 200)">
            <img src="https://s1.chu0.com/src/img/gif/84/841d4abb6ac4416cbadab4ca8f38cd44.gif">200
        </div>
        <div class="card" onclick="sel('snowpea', this, 175)">
            <img src="https://s1.chu0.com/src/img/gif/3b/3bb997567dce4673abc620d6f92b6943.gif">175
        </div>
        <div class="card" onclick="sel('torchwood', this, 175)">
            <img src="https://s1.chu0.com/src/img/gif/46/46301be226ca423aafb9e63b99e1872d.gif">175
        </div>
        <div class="card" onclick="sel('wallnut', this, 50)">
            <img src="https://s1.chu0.com/prevfiles/649b5e337e454145809433788a1ee770.gif">50
        </div>
    </div>

    <div id="sun-val">☀️ 250</div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
const cvs = document.getElementById('gameCanvas');
const ctx = cvs.getContext('2d');
cvs.width = 900; cvs.height = 600;

// 贴图库
const img = {};
const load = (k, v) => { img[k] = new Image(); img[k].src = v; };

load('gatling', "https://s1.chu0.com/src/img/gif/84/841d4abb6ac4416cbadab4ca8f38cd44.gif");
load('snowpea', "https://s1.chu0.com/src/img/gif/3b/3bb997567dce4673abc620d6f92b6943.gif");
load('torchwood', "https://s1.chu0.com/src/img/gif/46/46301be226ca423aafb9e63b99e1872d.gif");
load('wallnut', "https://s1.chu0.com/prevfiles/649b5e337e454145809433788a1ee770.gif");
load('zombie', "https://s1.chu0.com/prevfiles/96eaef96cd134f3c9c9c9e6c20185022.gif");
load('pea', "https://s1.aigei.com/src/img/gif/d6/d645f782c58a4369a45b7367c31766a0.gif");
load('fire', "https://s1.chu0.com/prevfiles/53666e346fc2405e8379faf2dd9aa31f.gif");

let sun = 250, mode = 'normal', active = 'gatling', activeCost = 200;
let plants = [], zombies = [], bullets = [], running = false, frame = 0;
const grid = { x: 45, y: 100, size: 95 };

function start(m) {
    mode = m; sun = (m === 'mod') ? 99999 : 250;
    document.getElementById('sun-val').innerText = "☀️ " + sun;
    document.getElementById('menu-layer').style.display = 'none';
    running = true;
    loop();
}

function sel(t, el, cost) {
    active = t; activeCost = cost;
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
}

function loop() {
    if(!running) return;
    ctx.clearRect(0, 0, 900, 600);

    // 草地
    for(let r=0; r<5; r++) for(let c=0; c<9; c++) {
        ctx.fillStyle = (r+c)%2===0 ? '#4caf50' : '#81c784';
        ctx.fillRect(grid.x + c*grid.size, grid.y + r*grid.size, grid.size, grid.size);
    }

    // 植物
    plants.forEach(p => {
        if(img[p.t].complete) ctx.drawImage(img[p.t], p.x+10, p.y+10, 75, 75);
        p.timer++;
        if(p.timer % 90 === 0 && (p.t==='gatling' || p.t==='snowpea')) {
            bullets.push({x: p.x+60, y: p.y+20, t: p.t==='snowpea'?'ice':'pea', row: p.row});
            if(p.t === 'gatling') setTimeout(()=>bullets.push({x: p.x+60, y: p.y+20, t: 'pea', row: p.row}), 200);
        }
    });

    // 子弹逻辑 (火球联动)
    bullets.forEach((b, i) => {
        b.x += 7;
        plants.forEach(p => { if(p.t==='torchwood' && b.x > p.x && b.x < p.x+50 && b.row === p.row) b.t='fire'; });
        
        let bImg = (b.t==='fire') ? img.fire : img.pea;
        if(bImg.complete) ctx.drawImage(bImg, b.x, b.y, 40, 30);
        
        zombies.forEach((z, zi) => {
            if(b.x > z.x && b.x < z.x+50 && b.row === z.row) {
                z.hp -= (b.t==='fire'?40:20);
                bullets.splice(i, 1);
                if(z.hp <= 0) zombies.splice(zi, 1);
            }
        });
        if(b.x > 900) bullets.splice(i, 1);
    });

    // 僵尸
    if(frame % 200 === 0) zombies.push({x: 900, row: Math.floor(Math.random()*5), hp: 150});
    zombies.forEach(z => {
        if(img.zombie.complete) ctx.drawImage(img.zombie, z.x, grid.y + z.row*grid.size, 80, 80);
        z.x -= 0.5;
        if(z.x < 0) { running = false; alert('游戏结束'); location.reload(); }
    });

    frame++;
    requestAnimationFrame(loop);
}

// 种植控制 (修复重复种植)
cvs.onmousedown = (e) => {
    const rect = cvs.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const c = Math.floor((mx - grid.x) / grid.size);
    const r = Math.floor((my - grid.y) / grid.size);

    if(c >= 0 && c < 9 && r >= 0 && r < 5) {
        const gx = grid.x + c*grid.size, gy = grid.y + r*grid.size;
        if(!plants.some(p => p.x === gx && p.y === gy)) {
            if(sun >= activeCost || mode === 'mod') {
                plants.push({x: gx, y: gy, row: r, t: active, timer: 0});
                if(mode !== 'mod') { sun -= activeCost; document.getElementById('sun-val').innerText = "☀️ " + sun; }
            }
        }
    }
}
</script>
</body>
</html>
