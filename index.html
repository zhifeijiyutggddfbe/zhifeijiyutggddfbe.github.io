<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>植物大战僵尸 - 经典草地版</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #111; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: 'Arial', sans-serif; }
        
        #game-container { 
            position: relative; 
            width: 1000px; 
            height: 600px; 
            background: #4caf50; 
            border: 5px solid #3e2723; 
            box-sizing: border-box; 
            transform-origin: center; 
            overflow: hidden; 
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
        }

        /* 菜单界面 */
        #menu { position: absolute; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
        .btn { padding: 15px 50px; margin: 10px; font-size: 22px; cursor: pointer; background: #4e342e; color: #ff0; border: 3px solid #ff0; border-radius: 15px; font-weight: bold; }
        .btn:active { transform: scale(0.95); }

        /* 工具栏 */
        #toolbar { position: absolute; top: 10px; left: 10px; display: flex; gap: 8px; background: rgba(0,0,0,0.6); padding: 8px; border-radius: 8px; z-index: 10; border: 1px solid #555; align-items: center; }
        .card { width: 65px; height: 90px; background: #666; border: 2px solid #333; cursor: pointer; text-align: center; position: relative; }
        .card.active { border-color: #0f0; background: #888; box-shadow: 0 0 10px #0f0; }
        .card img { width: 40px; height: 40px; display: block; margin: 5px auto 2px; pointer-events: none; }
        .cost { color: #ff0; font-weight: bold; font-size: 14px; }
        .name { font-size: 11px; color: #fff; }

        #shovel { width: 65px; height: 65px; background: #444; border: 2px solid #888; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #shovel img { width: 50px; height: 50px; pointer-events: none; }
        #shovel.active { border-color: #f00; background: #722; box-shadow: 0 0 10px #f00; }

        /* 阳光数值 */
        #sun-box { position: absolute; top: 15px; right: 25px; font-size: 28px; color: #ff0; font-weight: bold; z-index: 10; background: rgba(0,0,0,0.6); padding: 5px 20px; border-radius: 20px; border: 2px solid #ff0; }
        
        canvas { display: block; touch-action: none; cursor: crosshair; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu">
        <h1 style="font-size: 48px; margin-bottom: 30px; text-shadow: 2px 2px #000;">PLANTS VS ZOMBIES</h1>
        <div class="btn" onclick="start('normal')">开始游戏</div>
        <div class="btn" onclick="start('mod')" style="color:#0f0; border-color:#0f0;">无限阳光模式</div>
    </div>

    <div id="toolbar">
        <div class="card active" id="card-pea" onclick="sel('pea', 100, this)">
            <img src="https://s1.aigei.com/prevfiles/0c48c399aa024288837b5db9214a7251.gif">
            <div class="cost">100</div><div class="name">豌豆</div>
        </div>
        <div class="card" id="card-sunflower" onclick="sel('sunflower', 50, this)">
            <img src="https://s1.aigei.com/prevfiles/1970c9beda3243949100b4eb9f4453f5.gif">
            <div class="cost">50</div><div class="name">向日葵</div>
        </div>
        <div class="card" id="card-wallnut" onclick="sel('wallnut', 50, this)">
            <img src="https://s1.chu0.com/prevfiles/649b5e337e454145809433788a1ee770.gif">
            <div class="cost">50</div><div class="name">坚果</div>
        </div>
        <div id="shovel" onclick="useShovel()">
            <img src="https://simg.doyo.cn/imgfile/bgame/202502/14173649szcp.png">
        </div>
    </div>

    <div id="sun-box">☀️ <span id="sun-val">150</span></div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
const cvs = document.getElementById('gameCanvas');
const ctx = cvs.getContext('2d');
cvs.width = 1000; cvs.height = 600;

// 图片资源
const img = {};
const load = (k, v) => { img[k] = new Image(); img[k].src = v; };
load('pea', "https://s1.aigei.com/prevfiles/0c48c399aa024288837b5db9214a7251.gif");
load('sunflower', "https://s1.aigei.com/prevfiles/1970c9beda3243949100b4eb9f4453f5.gif");
load('wallnut', "https://s1.chu0.com/prevfiles/649b5e337e454145809433788a1ee770.gif");
load('zombie', "https://s1.chu0.com/prevfiles/96eaef96cd134f3c9c9c9e6c20185022.gif");
load('sun', "https://s1.chu0.com/prevfiles/c5df756ba71b4cc192efa14b8320f64b.gif");

// 游戏变量
let sun = 150, mode = 'normal', activeP = 'pea', activeC = 100, isShovel = false;
let plants = [], zombies = [], bullets = [], suns = [], running = false, frame = 0;

// 网格配置 (5行 9列)
const grid = { x: 120, y: 100, w: 90, h: 100, rows: 5, cols: 9 };

function drawBackground() {
    // 基础草地
    ctx.fillStyle = "#388e3c";
    ctx.fillRect(0, 0, 1000, 600);
    // 格子交替颜色
    for(let r=0; r<grid.rows; r++) {
        for(let c=0; c<grid.cols; c++) {
            ctx.fillStyle = (r + c) % 2 === 0 ? "#45a049" : "#4caf50";
            ctx.fillRect(grid.x + c*grid.w, grid.y + r*grid.h, grid.w, grid.h);
        }
    }
}

function start(m) {
    mode = m; sun = (m === 'mod') ? 99999 : 150;
    document.getElementById('sun-val').innerText = (m==='mod'?'∞':sun);
    document.getElementById('menu').style.display = 'none';
    running = true; loop();
}

function loop() {
    if(!running) return;
    drawBackground();

    // 1. 植物逻辑
    plants.forEach((p, pi) => {
        if(img[p.t].complete) ctx.drawImage(img[p.t], p.x+10, p.y+10, 70, 80);
        p.timer++;
        // 向日葵产阳光
        if(p.t === 'sunflower' && p.timer % 450 === 0) {
            suns.push({x: p.x + 20, y: p.y, vy: -2, targetY: p.y+40, life: 500});
        }
        // 豌豆射击
        if(p.t === 'pea' && p.timer % 90 === 0) {
            if(zombies.some(z => z.row === p.row && z.x > p.x)) {
                bullets.push({x: p.x+60, y: p.y+28, row: p.row});
            }
        }
    });

    // 2. 子弹逻辑
    bullets.forEach((b, bi) => {
        b.x += 8;
        ctx.fillStyle = "#90ee90";
        ctx.beginPath(); ctx.arc(b.x, b.y, 8, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.stroke();
        
        zombies.forEach(z => {
            if(b.x > z.x + 20 && b.x < z.x+80 && b.row === z.row) {
                z.hp -= 20;
                bullets.splice(bi, 1);
            }
        });
        if(b.x > 1000) bullets.splice(bi, 1);
    });

    // 3. 阳光掉落
    if(frame % 300 === 0) {
        suns.push({x: Math.random()*600+200, y: -50, vy: 1.5, targetY: Math.random()*300+150, life: 600});
    }
    suns.forEach((s, si) => {
        if(img.sun.complete) ctx.drawImage(img.sun, s.x, s.y, 60, 60);
        if(s.y < s.targetY) s.y += s.vy;
        s.life--; if(s.life <= 0) suns.splice(si, 1);
    });

    // 4. 僵尸逻辑
    if(frame % 240 === 0) {
        zombies.push({x: 1000, row: Math.floor(Math.random()*5), hp: 160});
    }
    zombies.forEach((z, zi) => {
        if(img.zombie.complete) ctx.drawImage(img.zombie, z.x, grid.y + z.row*grid.h - 10, 90, 100);
        
        let eating = false;
        plants.forEach(p => {
            if(z.x < p.x + 50 && z.x > p.x && z.row === p.row) {
                eating = true;
                p.hp -= 0.6;
                if(p.hp <= 0) plants.splice(plants.indexOf(p), 1);
            }
        });

        if(!eating) z.x -= 0.8;
        if(z.hp <= 0) zombies.splice(zi, 1);
        if(z.x < 20) {
            running = false;
            alert('僵尸进入了你的家！游戏结束！');
            location.reload();
        }
    });

    frame++; requestAnimationFrame(loop);
}

// 触摸/点击交互处理
function handleInput(clientX, clientY) {
    const rect = cvs.getBoundingClientRect();
    const scale = rect.width / 1000;
    const mx = (clientX - rect.left) / scale;
    const my = (clientY - rect.top) / scale;

    // 优先判定点击阳光
    for(let i=0; i<suns.length; i++) {
        let s = suns[i];
        if(mx > s.x && mx < s.x+70 && my > s.y && my < s.y+70) {
            suns.splice(i, 1);
            if(mode !== 'mod') { sun += 25; document.getElementById('sun-val').innerText = sun; }
            return;
        }
    }

    // 判定网格点击
    const c = Math.floor((mx - grid.x) / grid.w);
    const r = Math.floor((my - grid.y) / grid.h);

    if(c >= 0 && c < grid.cols && r >= 0 && r < grid.rows) {
        const gx = grid.x + c * grid.w;
        const gy = grid.y + r * grid.h;
        const existingIdx = plants.findIndex(p => p.x === gx && p.y === gy);

        if(isShovel) {
            if(existingIdx !== -1) plants.splice(existingIdx, 1);
        } else {
            if(existingIdx === -1 && (sun >= activeC || mode === 'mod')) {
                plants.push({
                    x: gx, y: gy, row: r, t: activeP, 
                    hp: activeP === 'wallnut' ? 2000 : 100, 
                    timer: 0
                });
                if(mode !== 'mod') { sun -= activeC; document.getElementById('sun-val').innerText = sun; }
            }
        }
    }
}

// 按钮控制
function sel(t, c, el) {
    isShovel = false;
    document.getElementById('shovel').classList.remove('active');
    activeP = t; activeC = c;
    document.querySelectorAll('.card').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
}

function useShovel() {
    isShovel = !isShovel;
    document.getElementById('shovel').classList.toggle('active', isShovel);
    if(isShovel) {
        activeP = null;
        document.querySelectorAll('.card').forEach(i => i.classList.remove('active'));
    }
}

// 监听事件
cvs.addEventListener('mousedown', (e) => handleInput(e.clientX, e.clientY));
cvs.addEventListener('touchstart', (e) => { 
    e.preventDefault(); 
    handleInput(e.touches[0].clientX, e.touches[0].clientY); 
}, {passive: false});

// 窗口自适应
function resize() {
    const scale = Math.min(window.innerWidth / 1000, window.innerHeight / 600);
    document.getElementById('game-container').style.transform = `scale(${scale})`;
}
window.addEventListener('resize', resize);
resize();

</script>
</body>
</html>
