<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>PVZ 修复增强版</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #222; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        #game-container { 
            position: relative; width: 1000px; height: 640px; 
            background: #45a049; border: 6px solid #3e2723; 
            box-sizing: border-box; transform-origin: center; 
            overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        #menu { position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn { padding: 12px 40px; margin: 10px; font-size: 20px; cursor: pointer; background: #4e342e; color: #fff; border: 2px solid #ff0; border-radius: 12px; }
        #toolbar { position: absolute; top: 10px; left: 10px; display: flex; gap: 4px; background: rgba(0,0,0,0.7); padding: 5px; border-radius: 5px; z-index: 10; border: 1px solid #444; }
        #top-right-controls { position: absolute; top: 10px; right: 20px; display: flex; align-items: center; gap: 15px; z-index: 20; }
        .card { width: 60px; height: 85px; background: #555; border: 2px solid #333; cursor: pointer; text-align: center; position: relative; overflow: hidden; }
        .card.active { border-color: #0f0; background: #666; }
        .card::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.6); height: var(--cd, 0%); }
        .card img { width: 38px; height: 38px; display: block; margin: 2px auto; pointer-events: none; }
        .cost { color: #ff0; font-weight: bold; font-size: 11px; }
        .name { font-size: 9px; color: #fff; }
        #shovel { width: 60px; height: 60px; background: rgba(0,0,0,0.6); border: 3px solid #888; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #shovel img { width: 45px; height: 45px; pointer-events: none; }
        #shovel.active { border-color: #f00; background: #722; }
        #sun-box { font-size: 24px; color: #ff0; font-weight: bold; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 15px; border: 2px solid #666; pointer-events: none;}
        canvas { display: block; touch-action: none; position: absolute; top:0; left:0; }
    </style>
</head>
<body>
<div id="game-container">
    <div id="menu">
        <h2 style="color:#ff0">PVZ · 纯代码修复版</h2>
        <div class="btn" onclick="start('normal')">正常模式</div>
        <div class="btn" onclick="start('mod')" style="color:#ff4444;">无限阳光</div>
    </div>
    <div id="toolbar">
        <div class="card active" onclick="sel('pea', 100, this)"><img src="https://s1.aigei.com/prevfiles/0c48c399aa024288837b5db9214a7251.gif?e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:0MCPPPifyEncWX2yXeHcMKqtVa0="><div class="cost">100</div><div class="name">豌豆</div></div>
        <div class="card" onclick="sel('repeater', 200, this)"><img src="https://s1.chu0.com/src/img/gif/84/841d4abb6ac4416cbadab4ca8f38cd44.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:5zuNEsOdTyxH_6WDOpsD4OgZkEY="><div class="cost">200</div><div class="name">双发</div></div>
        <div class="card" onclick="sel('threepeater', 325, this)"><img src="https://s1.chu0.com/prevfiles/297c79eb6ad8496eae9915741ff893fa.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:Voy_F3P8RV-sBOyIGDCdzzwedAQ="><div class="cost">325</div><div class="name">三发</div></div>
        <div class="card" onclick="sel('snowpea', 175, this)"><img src="https://s1.chu0.com/src/img/gif/3b/3bb997567dce4673abc620d6f92b6943.gif"><div class="cost">175</div><div class="name">寒冰</div></div>
        <div class="card" onclick="sel('torchwood', 175, this)"><img src="https://s1.chu0.com/src/img/gif/46/46301be226ca423aafb9e63b99e1872d.gif"><div class="cost">175</div><div class="name">火炬</div></div>
        <div class="card" onclick="sel('wallnut', 50, this)"><img src="https://s1.chu0.com/prevfiles/649b5e337e454145809433788a1ee770.gif"><div class="cost">50</div><div class="name">坚果</div></div>
        <div class="card" onclick="sel('sunflower', 50, this)"><img src="https://s1.aigei.com/prevfiles/1970c9beda3243949100b4eb9f4453f5.gif?e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:DSIZp4_WAt59X2K0B8EIQ7W21-o="><div class="cost">50</div><div class="name">向日葵</div></div>
        <div class="card" onclick="sel('cherry', 150, this)"><img src="https://s1.aigei.com/prevfiles/5a4686e74c374bac930c5ebaebda4a12.gif?e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:OyySlfi61PYxOknNrdf5CV2FDWQ="><div class="cost">150</div><div class="name">樱桃</div></div>
    </div>
    <div id="top-right-controls">
        <div id="sun-box">☀️ <span id="sun-val">150</span></div>
        <div id="shovel" onclick="useShovel()">
            <img src="https://simg.doyo.cn/imgfile/bgame/202502/14173649szcp.png">
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
const cvs = document.getElementById('gameCanvas');
const ctx = cvs.getContext('2d');
cvs.width = 1000; cvs.height = 640;

const img = {};
const load = (k, v) => { img[k] = new Image(); img[k].src = v; };
load('pea', "https://s1.aigei.com/prevfiles/0c48c399aa024288837b5db9214a7251.gif?e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:0MCPPPifyEncWX2yXeHcMKqtVa0=");
load('repeater', "https://s1.chu0.com/src/img/gif/84/841d4abb6ac4416cbadab4ca8f38cd44.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:5zuNEsOdTyxH_6WDOpsD4OgZkEY=");
load('threepeater', "https://s1.chu0.com/prevfiles/297c79eb6ad8496eae9915741ff893fa.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:Voy_F3P8RV-sBOyIGDCdzzwedAQ=");
load('snowpea', "https://s1.chu0.com/src/img/gif/3b/3bb997567dce4673abc620d6f92b6943.gif");
load('torchwood', "https://s1.chu0.com/src/img/gif/46/46301be226ca423aafb9e63b99e1872d.gif");
load('wallnut', "https://s1.chu0.com/prevfiles/649b5e337e454145809433788a1ee770.gif");
load('wallnut_cracked', "https://s1.chu0.com/prevfiles/c0c1c79695bc4d189deae85b9a545c6c.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:n0MPNeSLBJGqYFWb3LtWHKJEqGw=");
load('sunflower', "https://s1.aigei.com/prevfiles/1970c9beda3243949100b4eb9f4453f5.gif?e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:DSIZp4_WAt59X2K0B8EIQ7W21-o=");
load('cherry', "https://s1.aigei.com/prevfiles/5a4686e74c374bac930c5ebaebda4a12.gif?e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:OyySlfi61PYxOknNrdf5CV2FDWQ=");
load('boom', "https://s1.chu0.com/prevfiles/cf167a87e9f14411ae7734c039d81d9f.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:j0F9e2FSvd2eZnH07fgDJtQVq2w=");
load('sun', "https://s1.chu0.com/prevfiles/c5df756ba71b4cc192efa14b8320f64b.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:qr3Mhje4FeFBSERkl_AU6GNJEuw=");
load('zombie', "https://s1.chu0.com/prevfiles/96eaef96cd134f3c9c9c9e6c20185022.gif");
load('fire_bullet', "https://s1.chu0.com/prevfiles/53666e346fc2405e8379faf2dd9aa31f.gif");
load('normal_pea', "https://s1.chu0.com/prevfiles/e527151f9bcb43acb57d8d5b11a25098.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:o_m__m56SDyi9wc8MXP988tzn00=");

let sun = 150, mode = 'normal', activeP = 'pea', activeC = 100, isShovel = false;
let plants = [], zombies = [], bullets = [], suns = [], effects = [], running = false, frame = 0;
const cooldowns = { pea:0, repeater:0, threepeater:0, sunflower:0, cherry:0, snowpea:0, torchwood:0, wallnut:0 };
const CD_MAX = { pea:90, repeater:180, threepeater:240, sunflower:90, cherry:800, snowpea:180, torchwood:180, wallnut:400 };
const grid = { x: 140, y: 100, w: 85, h: 100, rows: 5, cols: 9 }; 

function start(m) {
    mode = m; sun = (m === 'mod') ? 99999 : 150;
    document.getElementById('sun-val').innerText = (m==='mod'?'∞':sun);
    document.getElementById('menu').style.display = 'none';
    running = true; loop();
}

function sel(t, c, el) {
    isShovel = false; document.getElementById('shovel').classList.remove('active');
    activeP = t; activeC = c;
    document.querySelectorAll('.card').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
}

function useShovel() {
    isShovel = !isShovel;
    document.getElementById('shovel').classList.toggle('active', isShovel);
    if(isShovel) { activeP = null; document.querySelectorAll('.card').forEach(i => i.classList.remove('active')); }
}

function loop() {
    if(!running) return;
    ctx.fillStyle = "#4caf50"; ctx.fillRect(0, 0, 1000, 640);
    ctx.fillStyle = "#388e3c"; ctx.fillRect(0, 0, 140, 640);
    for(let r=0; r<grid.rows; r++) {
        for(let c=0; c<grid.cols; c++) {
            ctx.fillStyle = (r + c) % 2 === 0 ? "#45a049" : "#4caf50";
            ctx.fillRect(grid.x + c*grid.w, grid.y + r*grid.h, grid.w, grid.h);
        }
    }

    for(let k in cooldowns) if(cooldowns[k]>0) {
        cooldowns[k]--;
        const el = document.querySelector(`.card[onclick*="${k}"]`);
        if(el) el.style.setProperty('--cd', (cooldowns[k]/CD_MAX[k]*100)+'%');
    }

    plants.forEach((p, pi) => {
        let dImg = (p.t === 'wallnut' && p.hp < 600) ? img.wallnut_cracked : img[p.t];
        if(dImg && dImg.complete) ctx.drawImage(dImg, p.x+5, p.y+10, 75, 85);
        p.timer++;
        if(p.t === 'sunflower' && p.timer % 400 === 0) {
            // 修复：阳光落下逻辑
            suns.push({x: p.x+20, y: p.y+20, vy: -4, targetY: p.y+60, life: 500, type: 'produce'});
        }
        if(p.t === 'cherry' && p.timer > 60) {
            effects.push({x: p.x-80, y: p.y-80, t: 'boom', w: 240, h: 240, life: 40});
            zombies.forEach(z => { if(Math.abs(z.x-p.x)<150 && Math.abs(z.row-p.row)<=1) z.hp -= 2000; });
            plants.splice(pi, 1);
        }
        if(p.timer % 90 === 0 && ['pea','repeater','snowpea','threepeater'].includes(p.t)) {
            let shoot = zombies.some(z => {
                if(p.t === 'threepeater') return Math.abs(z.row - p.row) <= 1 && z.x > p.x;
                return z.row === p.row && z.x > p.x;
            });
            if(shoot) p.pending = (p.t==='repeater'?2:1);
        }
        if(p.pending > 0 && p.timer % 15 === 0) {
            const bBase = {row: p.row, transformed: false};
            if(p.t === 'threepeater') {
                for(let rd = -1; rd <= 1; rd++) {
                    if(p.row+rd>=0 && p.row+rd<5) bullets.push({...bBase, x: p.x+60, y: grid.y+(p.row+rd)*grid.h+25, row: p.row+rd, t:'bone'});
                }
            } else {
                bullets.push({...bBase, x: p.x+60, y: p.y+25, t: p.t==='snowpea'?'ice':'bone'});
            }
            p.pending--;
        }
    });

    bullets.forEach((b, bi) => {
        b.x += 8;
        // 核心修复：一旦 transformed 为 true，不再进入火炬判定，防止死循环
        if(!b.transformed) {
            plants.forEach(p => {
                if(p.t === 'torchwood' && p.row === b.row && b.x > p.x + 20 && b.x < p.x + 50) {
                    if(b.t === 'ice') { b.t = 'bone'; b.transformed = true; }
                    else if(b.t === 'bone') { b.t = 'fire'; b.transformed = true; }
                }
            });
        }

        if(b.t === 'fire') { if(img.fire_bullet.complete) ctx.drawImage(img.fire_bullet, b.x, b.y-10, 50, 40); }
        else if(b.t === 'ice') { ctx.fillStyle="#00f2ff"; ctx.beginPath(); ctx.arc(b.x+15, b.y+10, 10, 0, 7); ctx.fill(); }
        else { if(img.normal_pea.complete) ctx.drawImage(img.normal_pea, b.x, b.y, 30, 30); }

        zombies.forEach(z => {
            if(b.x > z.x && b.x < z.x+60 && b.row === z.row) {
                z.hp -= (b.t==='fire'?50:20);
                if(b.t==='ice') z.slow = 120;
                bullets.splice(bi, 1);
            }
        });
        if(b.x > 1000) bullets.splice(bi, 1);
    });

    if(frame % 300 === 0) suns.push({x: Math.random()*500+300, y: -50, vy: 2, targetY: Math.random()*300+200, life: 600, type:'sky'});
    suns.forEach((s, si) => {
        if(img.sun.complete) ctx.drawImage(img.sun, s.x, s.y, 65, 65);
        if(s.y < s.targetY) s.y += s.vy; 
        else if(s.type === 'produce' && s.vy < 0) { s.vy += 0.2; s.y += s.vy; } // 生产阳光小跳动
        s.life--; if(s.life <= 0) suns.splice(si, 1);
    });

    if(frame % 240 === 0) zombies.push({x: 1000, row: Math.floor(Math.random()*5), hp: 150, slow: 0});
    zombies.forEach((z, zi) => {
        let speed = (z.slow > 0) ? 0.35 : 0.75;
        if(img.zombie.complete) ctx.drawImage(img.zombie, z.x, grid.y + z.row*grid.h, 90, 90);
        let eating = false;
        plants.forEach(p => {
            if(z.x < p.x+30 && z.x > p.x-20 && z.row === p.row) { eating = true; p.hp -= 1; if(p.hp <= 0) plants.splice(plants.indexOf(p), 1); }
        });
        if(!eating) z.x -= speed;
        if(z.hp <= 0) zombies.splice(zi, 1);
        if(z.x < 100) { running = false; alert('僵尸吃掉了你的脑子！'); location.reload(); }
    });

    effects.forEach((ef, efi) => {
        if(img[ef.t].complete) ctx.drawImage(img[ef.t], ef.x, ef.y, ef.w, ef.h);
        ef.life--; if(ef.life<=0) effects.splice(efi, 1);
    });
    frame++; requestAnimationFrame(loop);
}

function handleInput(clientX, clientY) {
    const rect = document.getElementById('game-container').getBoundingClientRect();
    const scale = rect.width / 1000;
    const mx = (clientX - rect.left) / scale, my = (clientY - rect.top) / scale;

    // 先检测阳光收集
    for(let i=0; i<suns.length; i++) {
        let s = suns[i];
        if(mx > s.x && mx < s.x+70 && my > s.y && my < s.y+70) {
            suns.splice(i, 1); sun += (mode==='mod'?0:25);
            document.getElementById('sun-val').innerText = (mode==='mod'?'∞':sun); return;
        }
    }

    // 检测铲子点击 (右上角区域)
    if(mx > 850 && my < 80) return; // 如果点击的是铲子或阳光区，不执行种植逻辑

    const c = Math.floor((mx - grid.x) / grid.w), r = Math.floor((my - grid.y) / grid.h);
    if(c >= 0 && c < grid.cols && r >= 0 && r < grid.rows) {
        const gx = grid.x + c*grid.w, gy = grid.y + r*grid.h;
        const targetIdx = plants.findIndex(p => p.x === gx && p.y === gy);
        if(isShovel) { if(targetIdx !== -1) plants.splice(targetIdx, 1); return; }
        if(targetIdx === -1 && activeP) {
            if((sun >= activeC && cooldowns[activeP] <= 0) || mode === 'mod') {
                plants.push({x: gx, y: gy, row: r, t: activeP, hp: activeP==='wallnut'?2000:150, timer: 0, pending: 0});
                if(mode !== 'mod') { sun -= activeC; cooldowns[activeP] = CD_MAX[activeP]; document.getElementById('sun-val').innerText = sun; }
            }
        }
    }
}

cvs.addEventListener('mousedown', (e) => handleInput(e.clientX, e.clientY));
cvs.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e.touches[0].clientX, e.touches[0].clientY); });
</script>
</body>
</html>
