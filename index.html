<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>PVZ 全员集结版 - 最终修复版</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        #game-container { position: relative; width: 1000px; height: 640px; background: #4caf50; border: 4px solid #3e2723; box-sizing: border-box; transform-origin: center; overflow: hidden; }
        #menu { position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn { padding: 12px 40px; margin: 10px; font-size: 20px; cursor: pointer; background: #4e342e; color: #fff; border: 2px solid #ff0; border-radius: 12px; }
        #toolbar { position: absolute; top: 5px; left: 5px; display: flex; gap: 3px; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 5px; z-index: 10; border: 1px solid #444; }
        .card { width: 62px; height: 85px; background: #555; border: 2px solid #333; cursor: pointer; text-align: center; position: relative; overflow: hidden; }
        .card.active { border-color: #0f0; background: #666; }
        .card.cooldown::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.6); height: var(--cd, 0%); }
        .card img { width: 38px; height: 38px; display: block; margin: 2px auto; pointer-events: none; }
        .cost { color: #ff0; font-weight: bold; font-size: 11px; }
        .name { font-size: 9px; color: #fff; }
        #shovel { width: 50px; height: 50px; background: #333; border: 2px solid #fff; position: absolute; left: 530px; top: 5px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; }
        #shovel.active { border-color: #f00; }
        #sun-box { position: absolute; top: 10px; right: 20px; font-size: 24px; color: #ff0; font-weight: bold; z-index: 10; background: rgba(0,0,0,0.4); padding: 5px 12px; border-radius: 15px; }
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu">
        <h2 style="color:#ff0">PVZ · 太阳逻辑修复版</h2>
        <div class="btn" onclick="start('normal')">开始战斗</div>
        <div class="btn" onclick="start('mod')" style="color:#ff4444;">无限阳光</div>
    </div>

    <div id="toolbar">
        <div class="card active" id="card-pea" onclick="sel('pea', 100, this)"><img src="https://s1.aigei.com/prevfiles/0c48c399aa024288837b5db9214a7251.gif?e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:0MCPPPifyEncWX2yXeHcMKqtVa0="><div class="cost">100</div><div class="name">豌豆</div></div>
        <div class="card" id="card-repeater" onclick="sel('repeater', 200, this)"><img src="https://s1.chu0.com/src/img/gif/84/841d4abb6ac4416cbadab4ca8f38cd44.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:5zuNEsOdTyxH_6WDOpsD4OgZkEY="><div class="cost">200</div><div class="name">双发</div></div>
        <div class="card" id="card-snowpea" onclick="sel('snowpea', 175, this)"><img src="https://s1.chu0.com/src/img/gif/3b/3bb997567dce4673abc620d6f92b6943.gif"><div class="cost">175</div><div class="name">寒冰</div></div>
        <div class="card" id="card-torchwood" onclick="sel('torchwood', 175, this)"><img src="https://s1.chu0.com/src/img/gif/46/46301be226ca423aafb9e63b99e1872d.gif"><div class="cost">175</div><div class="name">火炬</div></div>
        <div class="card" id="card-wallnut" onclick="sel('wallnut', 50, this)"><img src="https://s1.chu0.com/prevfiles/649b5e337e454145809433788a1ee770.gif"><div class="cost">50</div><div class="name">坚果</div></div>
        <div class="card" id="card-sunflower" onclick="sel('sunflower', 50, this)"><img src="https://s1.aigei.com/prevfiles/1970c9beda3243949100b4eb9f4453f5.gif?e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:DSIZp4_WAt59X2K0B8EIQ7W21-o="><div class="cost">50</div><div class="name">向日葵</div></div>
        <div class="card" id="card-cherry" onclick="sel('cherry', 150, this)"><img src="https://s1.aigei.com/prevfiles/5a4686e74c374bac930c5ebaebda4a12.gif?e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:OyySlfi61PYxOknNrdf5CV2FDWQ="><div class="cost">150</div><div class="name">樱桃</div></div>
        <div class="card" id="card-squash" onclick="sel('squash', 50, this)"><img src="https://s1.chu0.com/prevfiles/e322eb1cbd3c4629887638b3cde1435d.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:JRDVjB_ANh2k6wa6tC_ZBPBCq7U="><div class="cost">50</div><div class="name">倭瓜</div></div>
    </div>

    <div id="shovel" onclick="useShovel()">🧹</div>
    <div id="sun-box">☀️ <span id="sun-val">150</span></div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
const container = document.getElementById('game-container');
const cvs = document.getElementById('gameCanvas');
const ctx = cvs.getContext('2d');
cvs.width = 1000; cvs.height = 640;

function resize() {
    const scale = Math.min(window.innerWidth / 1000, window.innerHeight / 640);
    container.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', resize); resize();

const img = {};
const load = (k, v) => { img[k] = new Image(); img[k].src = v; };
load('pea', "https://s1.aigei.com/prevfiles/0c48c399aa024288837b5db9214a7251.gif?e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:0MCPPPifyEncWX2yXeHcMKqtVa0=");
load('repeater', "https://s1.chu0.com/src/img/gif/84/841d4abb6ac4416cbadab4ca8f38cd44.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:5zuNEsOdTyxH_6WDOpsD4OgZkEY=");
load('snowpea', "https://s1.chu0.com/src/img/gif/3b/3bb997567dce4673abc620d6f92b6943.gif");
load('torchwood', "https://s1.chu0.com/src/img/gif/46/46301be226ca423aafb9e63b99e1872d.gif");
load('wallnut', "https://s1.chu0.com/prevfiles/649b5e337e454145809433788a1ee770.gif");
load('sunflower', "https://s1.aigei.com/prevfiles/1970c9beda3243949100b4eb9f4453f5.gif?e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:DSIZp4_WAt59X2K0B8EIQ7W21-o=");
load('cherry', "https://s1.aigei.com/prevfiles/5a4686e74c374bac930c5ebaebda4a12.gif?e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:OyySlfi61PYxOknNrdf5CV2FDWQ=");
load('boom', "https://s1.chu0.com/prevfiles/cf167a87e9f14411ae7734c039d81d9f.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:j0F9e2FSvd2eZnH07fgDJtQVq2w=");
load('squash', "https://s1.chu0.com/prevfiles/e322eb1cbd3c4629887638b3cde1435d.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:JRDVjB_ANh2k6wa6tC_ZBPBCq7U=");
load('sun', "https://s1.chu0.com/prevfiles/c5df756ba71b4cc192efa14b8320f64b.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:qr3Mhje4FeFBSERkl_AU6GNJEuw=");
load('zombie', "https://s1.chu0.com/prevfiles/96eaef96cd134f3c9c9c9e6c20185022.gif");
load('boss', "https://s1.chu0.com/prevfiles/26a3b77e34f748f09b80a348f5116a26.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:guWfQkrkVo8reVTrDgT-Xb7GyNs=");
load('fire_bullet', "https://s1.chu0.com/prevfiles/53666e346fc2405e8379faf2dd9aa31f.gif");

let sun = 150, mode = 'normal', activeP = 'pea', activeC = 100, isShovel = false;
let plants = [], zombies = [], bullets = [], suns = [], effects = [], running = false, frame = 0;
const grid = { x: 50, y: 110, size: 100 };
const cooldowns = { pea:0, repeater:0, sunflower:0, cherry:0, squash:0, snowpea:0, torchwood:0, wallnut:0 };
const CD_MAX = { pea:90, repeater:180, sunflower:90, cherry:800, squash:400, snowpea:180, torchwood:180, wallnut:400 };

function start(m) {
    mode = m; sun = (m === 'mod') ? 999999 : 150;
    document.getElementById('sun-val').innerText = (m==='mod'?'∞':sun);
    document.getElementById('menu').style.display = 'none';
    running = true; loop();
}

function sel(t, c, el) {
    isShovel = false; document.getElementById('shovel').classList.remove('active');
    activeP = t; activeC = c;
    document.querySelectorAll('.card').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
}

function useShovel() {
    isShovel = !isShovel;
    document.getElementById('shovel').classList.toggle('active', isShovel);
}

function loop() {
    if(!running) return;
    ctx.clearRect(0, 0, 1000, 640);

    for(let r=0; r<5; r++) for(let c=0; c<9; c++) {
        ctx.fillStyle = (r+c)%2===0 ? '#4caf50' : '#81c784';
        ctx.fillRect(grid.x + c*grid.size, grid.y + r*grid.size, grid.size, grid.size);
    }

    for(let k in cooldowns) if(cooldowns[k]>0) {
        cooldowns[k]--;
        document.getElementById('card-'+k).style.setProperty('--cd', (cooldowns[k]/CD_MAX[k]*100)+'%');
    }

    plants.forEach((p, pi) => {
        if(img[p.t].complete) ctx.drawImage(img[p.t], p.x+10, p.y+10, 80, 80);
        p.timer++;
        
        // 修正向日葵太阳逻辑：划出弧线并停留在草地上
        if(p.t === 'sunflower' && p.timer % 400 === 0) {
            suns.push({x: p.x+20, y: p.y+10, vy: -3, targetY: p.y+40, life: 500});
        }
        
        if(p.t === 'cherry' && p.timer > 60) {
            effects.push({x: p.x-100, y: p.y-100, t: 'boom', w: 300, h: 300, life: 40});
            zombies.forEach(z => {
                let zGridX = (z.x - grid.x) / grid.size;
                let pGridX = (p.x - grid.x) / grid.size;
                if(Math.abs(zGridX - pGridX) <= 1.5 && Math.abs(z.row - p.row) <= 1) z.hp -= 2000;
            });
            plants.splice(pi, 1);
        }
        
        if(p.timer % 95 === 0 && ['pea','repeater','snowpea'].includes(p.t)) {
            if(zombies.some(z => z.row === p.row && z.x > p.x)) p.pending = (p.t==='repeater'?2:1);
        }
        if(p.pending > 0 && p.timer % 12 === 0) {
            bullets.push({x: p.x+70, y: p.y+25, row: p.row, t: p.t==='snowpea'?'ice':'bone'}); p.pending--;
        }
    });

    bullets.forEach((b, bi) => {
        b.x += 8;
        plants.forEach(p => {
            if(p.t === 'torchwood' && p.row === b.row && b.x > p.x + 20 && b.x < p.x + 60) {
                if(b.t === 'ice') b.t = 'bone';
                else if(b.t === 'bone') b.t = 'fire';
            }
        });

        if(b.t === 'fire') ctx.drawImage(img.fire_bullet, b.x, b.y-10, 50, 40);
        else if(b.t === 'ice') { ctx.fillStyle="#00f2ff"; ctx.beginPath(); ctx.arc(b.x+10, b.y+10, 8, 0, 7); ctx.fill(); }
        else { ctx.fillStyle="#fff"; ctx.beginPath(); ctx.roundRect(b.x, b.y+5, 22, 12, 5); ctx.fill(); }

        zombies.forEach(z => {
            if(b.x > z.x && b.x < z.x+60 && b.row === z.row) {
                z.hp -= (b.t==='fire'?50:20);
                if(b.t==='ice') z.slow = 120;
                bullets.splice(bi, 1);
            }
        });
        if(b.x > 1000) bullets.splice(bi, 1);
    });

    // 自然掉落太阳：掉到450高度停止
    if(frame % 300 === 0) suns.push({x: Math.random()*800+100, y: -50, vy: 1.5, targetY: 450, life: 600});
    
    suns.forEach((s, si) => {
        if(img.sun.complete) ctx.drawImage(img.sun, s.x, s.y, 70, 70);
        
        // 太阳移动逻辑：到达 targetY 后停止
        if(s.y < s.targetY) {
            s.y += s.vy;
            // 如果是向日葵产出的太阳，增加一个重力加速度
            if(s.vy < 0 || s.y < s.targetY - 20) s.vy += 0.1; 
        }
        
        s.life--; if(s.life <= 0) suns.splice(si, 1);
    });

    if(frame % 240 === 0) {
        let isBoss = (frame > 0 && frame % 1200 === 0);
        zombies.push({x: 1000, row: Math.floor(Math.random()*5), hp: isBoss?3500:150, t: isBoss?'boss':'zombie', slow: 0});
    }

    zombies.forEach((z, zi) => {
        if(z.slow > 0) z.slow--;
        let speed = (z.slow > 0) ? 0.35 : 0.75;
        let size = (z.t==='boss'?150:90), yOff = (z.t==='boss'?-40:0);
        if(img[z.t].complete) ctx.drawImage(img[z.t], z.x, grid.y + z.row*grid.size + yOff, size, size);
        
        let eating = false;
        plants.forEach((p, pi) => {
            if(z.x < p.x+45 && z.x > p.x-20 && z.row === p.row) {
                eating = true; p.hp -= (z.t==='boss'?5:1);
                if(p.t === 'squash') { z.hp -= 2000; effects.push({x: p.x, y: p.y, t:'boom', w: 100, h: 100, life:10}); plants.splice(pi, 1); }
                if(p.hp <= 0) plants.splice(pi, 1);
            }
        });
        if(!eating) z.x -= speed;
        if(z.hp <= 0) zombies.splice(zi, 1);
        if(z.x < -40) { running = false; alert('僵尸入侵！'); location.reload(); }
    });

    effects.forEach((ef, efi) => {
        if(img[ef.t].complete) ctx.drawImage(img[ef.t], ef.x, ef.y, ef.w||200, ef.h||200);
        ef.life--; if(ef.life<=0) effects.splice(efi, 1);
    });

    frame++; requestAnimationFrame(loop);
}

function handleInput(clientX, clientY) {
    const rect = container.getBoundingClientRect();
    const scale = rect.width / 1000;
    const mx = (clientX - rect.left) / scale, my = (clientY - rect.top) / scale;

    for(let i=0; i<suns.length; i++) {
        let s = suns[i];
        if(mx > s.x && mx < s.x+70 && my > s.y && my < s.y+70) {
            suns.splice(i, 1); sun += (mode==='mod'?0:25);
            document.getElementById('sun-val').innerText = (mode==='mod'?'∞':sun); return;
        }
    }

    const c = Math.floor((mx - grid.x) / grid.size), r = Math.floor((my - grid.y) / grid.size);
    if(c >= 0 && c < 9 && r >= 0 && r < 5) {
        const gx = grid.x + c*grid.size, gy = grid.y + r*grid.size;
        const targetIdx = plants.findIndex(p => p.x === gx && p.y === gy);
        if(isShovel) { if(targetIdx !== -1) plants.splice(targetIdx, 1); return; }
        if(targetIdx === -1 && activeP) {
            if((sun >= activeC && cooldowns[activeP] <= 0) || mode === 'mod') {
                let php = activeP==='wallnut'?2000:150;
                plants.push({x: gx, y: gy, row: r, t: activeP, hp: php, timer: 0, pending: 0});
                if(mode !== 'mod') { sun -= activeC; cooldowns[activeP] = CD_MAX[activeP]; document.getElementById('sun-val').innerText = sun; }
            }
        }
    }
}

cvs.addEventListener('mousedown', (e) => handleInput(e.clientX, e.clientY));
cvs.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e.touches[0].clientX, e.touches[0].clientY); });
</script>
</body>
</html>
