<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>PVZ: 资源预检完整版</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #game-wrapper { position: relative; width: 900px; height: 600px; margin: 10px auto; background: #222; border: 4px solid #3e2723; }
        
        /* 加载与菜单层 */
        #loading-overlay { 
            position: absolute; inset: 0; background: #1a1a1a; z-index: 200; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        #load-status { font-size: 20px; color: #ffee00; margin-bottom: 20px; }
        .progress-bar { width: 300px; height: 20px; border: 2px solid #555; border-radius: 10px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: #4caf50; transition: width 0.3s; }

        #menu-layer { display: none; flex-direction: column; align-items: center; justify-content: center; position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; }
        .btn { padding: 15px 50px; margin: 15px; font-size: 24px; cursor: pointer; background: #4e342e; color: #fff; border: 3px solid #ffee00; border-radius: 10px; }
        
        #toolbar { position: absolute; top: 10px; left: 10px; display: flex; gap: 5px; background: rgba(0,0,0,0.5); padding: 5px; z-index: 10; }
        .card { width: 60px; height: 80px; background: #333; border: 2px solid #666; cursor: pointer; text-align: center; font-size: 11px; }
        .card.active { border-color: #ff0; }
        .card img { width: 40px; height: 40px; display: block; margin: 2px auto; }
        
        #sun-val { position: absolute; top: 15px; right: 20px; font-size: 28px; color: #ff0; font-weight: bold; }
        canvas { display: block; background: #4caf50; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="loading-overlay">
        <div id="load-status">正在检查贴图资源 (0/14)...</div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <div id="menu-layer">
        <h1 style="color:#ffee00">PVZ 完整版</h1>
        <div class="btn" onclick="start('normal')">普通模式</div>
        <div class="btn" onclick="start('mod')" style="color:#ff3131">外挂模式 (无限阳光)</div>
    </div>

    <div id="toolbar">
        <div class="card active" onclick="sel('gatling', this)"><img src="https://s1.chu0.com/src/img/gif/84/841d4abb6ac4416cbadab4ca8f38cd44.gif">200</div>
        <div class="card" onclick="sel('snowpea', this)"><img src="https://s1.chu0.com/src/img/gif/3b/3bb997567dce4673abc620d6f92b6943.gif">175</div>
        <div class="card" onclick="sel('torchwood', this)"><img src="https://s1.chu0.com/src/img/gif/46/46301be226ca423aafb9e63b99e1872d.gif">175</div>
        <div class="card" onclick="sel('wallnut', this)"><img src="https://s1.chu0.com/prevfiles/649b5e337e454145809433788a1ee770.gif">50</div>
        <div class="card" onclick="sel('sunflower', this)"><img src="https://s1.aigei.com/prevfiles/6aa0a6c2859140a4bdc6d0be549b14ab.gif">50</div>
        <div class="card" onclick="sel('squash', this)"><img src="https://s1.chu0.com/prevfiles/e322eb1cbd3c4629887638b3cde1435d.gif">50</div>
    </div>

    <div id="sun-val">☀️ 250</div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
const cvs = document.getElementById('gameCanvas');
const ctx = cvs.getContext('2d');
cvs.width = 900; cvs.height = 600;

// --- 资源加载系统 ---
const assetsToLoad = {
    'gatling': "https://s1.chu0.com/src/img/gif/84/841d4abb6ac4416cbadab4ca8f38cd44.gif",
    'snowpea': "https://s1.chu0.com/src/img/gif/3b/3bb997567dce4673abc620d6f92b6943.gif",
    'torchwood': "https://s1.chu0.com/src/img/gif/46/46301be226ca423aafb9e63b99e1872d.gif",
    'wallnut': "https://s1.chu0.com/prevfiles/649b5e337e454145809433788a1ee770.gif",
    'sunflower': "https://s1.aigei.com/prevfiles/6aa0a6c2859140a4bdc6d0be549b14ab.gif",
    'squash': "https://s1.chu0.com/prevfiles/e322eb1cbd3c4629887638b3cde1435d.gif",
    'z_normal': "https://s1.chu0.com/prevfiles/96eaef96cd134f3c9c9c9e6c20185022.gif",
    'z_cone': "https://s1.aigei.com/prevfiles/3ee20f9d1ed34e54a9f019b08ebf3ae3.gif",
    'z_bucket': "https://s1.aigei.com/prevfiles/1e0bbb8f97c642b3a5c0d3fbacb3bdc5.gif",
    'z_boss': "https://s1.aigei.com/src/img/gif/76/76b814fea7564c468e2a8e2d0f063e45.gif",
    'z_boss_dead': "https://s1.chu0.com/prevfiles/7a8df65e1b254c0b972fc559932c0a1f.gif",
    'sun': "https://s1.aigei.com/prevfiles/4ac22e384ba04c15a36108f052c69eb6.gif",
    'pea': "https://s1.aigei.com/src/img/gif/d6/d645f782c58a4369a45b7367c31766a0.gif",
    'fire': "https://s1.chu0.com/prevfiles/53666e346fc2405e8379faf2dd9aa31f.gif"
};

const img = {};
let loadedCount = 0;
const totalAssets = Object.keys(assetsToLoad).length;

function checkAllLoaded() {
    loadedCount++;
    const percent = Math.floor((loadedCount / totalAssets) * 100);
    document.getElementById('progress-fill').style.width = percent + "%";
    document.getElementById('load-status').innerText = `正在检查贴图资源 (${loadedCount}/${totalAssets})...`;
    
    if (loadedCount >= totalAssets) {
        setTimeout(() => {
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('menu-layer').style.display = 'flex';
        }, 500);
    }
}

// 初始化加载
Object.entries(assetsToLoad).forEach(([key, url]) => {
    img[key] = new Image();
    img[key].onload = checkAllLoaded;
    img[key].onerror = checkAllLoaded; // 即使失败也继续，防止死锁
    img[key].src = url;
});

// 强制超时检测 (5秒)
setTimeout(() => {
    if(loadedCount < totalAssets) {
        console.warn("部分资源加载超时，已强制开启菜单。");
        document.getElementById('loading-overlay').style.display = 'none';
        document.getElementById('menu-layer').style.display = 'flex';
    }
}, 5000);

// --- 游戏逻辑 (保持之前的完整性) ---
let sun = 250, mode = 'normal', active = 'gatling', running = false;
let plants = [], zombies = [], bullets = [], suns = [], gameFrame = 0;

function start(m) {
    mode = m; sun = (m === 'mod') ? 99999 : 250;
    document.getElementById('sun-val').innerText = "☀️ " + sun;
    document.getElementById('menu-layer').style.display = 'none';
    running = true;
    animate();
}

function sel(t, e) { active = t; document.querySelectorAll('.card').forEach(c => c.classList.remove('active')); e.classList.add('active'); }

function animate() {
    if(!running) return;
    ctx.clearRect(0,0,900,600);
    // 草坪绘制
    for(let r=0; r<5; r++) for(let c=0; c<9; c++) {
        ctx.fillStyle = (r+c)%2===0 ? '#4caf50' : '#81c784';
        ctx.fillRect(45+c*95, 100+r*95, 95, 95);
    }

    // 绘制植物
    plants.forEach((p, pi) => {
        ctx.drawImage(img[p.t], p.x+10, p.y+10, 75, 75);
        if((p.t === 'gatling' || p.t === 'snowpea') && gameFrame % 90 === 0) {
            bullets.push({x:p.x+60, y:p.y+20, t: (p.t==='snowpea'?'ice':'pea')});
        }
    });

    // 子弹与僵尸碰撞... (篇幅原因，逻辑与上一版保持一致)
    bullets.forEach((b, i) => {
        b.x += 7;
        ctx.drawImage(b.t === 'fire' ? img.fire : img.pea, b.x, b.y, 40, 30);
        zombies.forEach(z => {
            if(b.x > z.x && b.x < z.x+50 && Math.abs(b.y - z.y) < 50) {
                z.hp -= 20; bullets.splice(i, 1);
            }
        });
    });

    // 僵尸生成
    if(gameFrame % 300 === 0) zombies.push({x:900, y:100+Math.floor(Math.random()*5)*95, hp:150, t:'normal'});

    zombies.forEach(z => {
        ctx.drawImage(img.z_normal, z.x, z.y, 80, 80);
        z.x -= 0.5;
    });

    gameFrame++;
    requestAnimationFrame(animate);
}

cvs.onmousedown = (e) => {
    const rect = cvs.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const c = Math.floor((mx-45)/95), r = Math.floor((my-100)/95);
    if(c>=0 && c<9 && r>=0 && r<5) {
        plants.push({x: 45+c*95, y: 100+r*95, t: active});
    }
}
</script>
</body>
</html>
