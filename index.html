<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PVZ 完整版</title>
<style>
html,body{margin:0;background:#222;display:flex;align-items:center;justify-content:center;height:100%}
#game-container{width:1000px;height:640px;background:#4caf50;position:relative}
canvas{position:absolute}
#menu{position:absolute;inset:0;background:#000c;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;z-index:10}
.btn{padding:12px 30px;margin:10px;background:#4e342e;border:2px solid #ff0;cursor:pointer}
#toolbar{position:absolute;top:5px;left:5px;display:flex;gap:5px;flex-wrap:wrap;width:500px}
.card{width:60px;height:80px;background:#555;color:#fff;text-align:center;font-size:10px;cursor:pointer}
</style>
</head>
<body>

<div id="game-container">
<div id="menu">
<h2>选择关卡</h2>
<div class="btn" onclick="chooseLevel('grass')">草地</div>
<div class="btn" onclick="chooseLevel('pool')">水池</div>
</div>

<div id="toolbar"></div>
<canvas id="gameCanvas" width="1000" height="640"></canvas>
</div>

<script>
const cvs=document.getElementById('gameCanvas');
const ctx=cvs.getContext('2d');
const menu=document.getElementById('menu');
const toolbar=document.getElementById('toolbar');

// ===== 图片 =====
const img={};
const load=(k,v)=>{img[k]=new Image();img[k].src=v};

load('pea',"https://s1.aigei.com/prevfiles/0c48c399aa024288837b5db9214a7251.gif");
load('repeater',"https://s1.chu0.com/src/img/gif/84/841d4abb6ac4416cbadab4ca8f38cd44.gif");
load('threepeater',"https://s1.chu0.com/prevfiles/297c79eb6ad8496eae9915741ff893fa.gif");
load('snowpea',"https://s1.chu0.com/src/img/gif/3b/3bb997567dce4673abc620d6f92b6943.gif");
load('torchwood',"https://s1.chu0.com/src/img/gif/46/46301be226ca423aafb9e63b99e1872d.gif");
load('wallnut',"https://s1.chu0.com/prevfiles/649b5e337e454145809433788a1ee770.gif");
load('wallnut_dmg',"https://s1.chu0.com/prevfiles/c0c1c79695bc4d189deae85b9a545c6c.gif");
load('sunflower',"https://s1.aigei.com/prevfiles/1970c9beda3243949100b4eb9f4453f5.gif");
load('cherry',"https://s1.aigei.com/prevfiles/5a4686e74c374bac930c5ebaebda4a12.gif");
load('squash',"https://s1.chu0.com/prevfiles/e322eb1cbd3c4629887638b3cde1435d.gif");
load('lilypad',"https://s1.chu0.com/prevfiles/8de79375fe824a228419c38c40351877.gif");
load('bullet',"https://s1.chu0.com/prevfiles/e527151f9bcb43acb57d8d5b11a25098.gif");
load('zombie',"https://s1.chu0.com/prevfiles/96eaef96cd134f3c9c9c9e6c20185022.gif");

// ===== 数据 =====
let plants=[],zombies=[],bullets=[];
let level='grass',mode='normal';
let deck=[],selecting=true;
let allPlants=['pea','repeater','threepeater','snowpea','torchwood','wallnut','sunflower','cherry','squash','lilypad'];
let page=0,active=null;

const grid={x:140,y:100,w:85,h:100,rows:5,cols:9};

// ===== 关卡 =====
function chooseLevel(l){
level=l;
menu.innerHTML=`
<h2>选择模式</h2>
<div class="btn" onclick="start('normal')">正常模式</div>
<div class="btn" onclick="start('mod')">无限模式</div>`;
}

// ===== 开始 =====
function start(m){
mode=m;

if(mode==='normal'){
menu.innerHTML='<h2>选8个植物</h2>';
allPlants.forEach(p=>{
let b=document.createElement('div');
b.className='btn';
b.innerText=p;
b.onclick=()=>{
if(deck.length<8){
deck.push(p);
b.style.opacity=0.5;
}
if(deck.length===8){
menu.style.display='none';
renderCards();
loop();
}
};
menu.appendChild(b);
});
}else{
menu.style.display='none';
renderCards();
loop();
}
}

// ===== 卡片 =====
function renderCards(){
toolbar.innerHTML='';
let list=(mode==='mod')?allPlants:deck;
let pageList=list.slice(page*8,(page+1)*8);

pageList.forEach(p=>{
let d=document.createElement('div');
d.className='card';
d.innerText=p;
d.onclick=()=>active=p;
toolbar.appendChild(d);
});

if(mode==='mod'){
let next=document.createElement('div');
next.className='card';
next.innerText='>';
next.onclick=()=>{page++;renderCards()};
toolbar.appendChild(next);
}
}

// ===== 背景 =====
function drawBG(){
ctx.fillStyle="#4caf50";
ctx.fillRect(0,0,1000,640);

if(level==='pool'){
ctx.fillStyle="#2bb3ff";
ctx.fillRect(grid.x,grid.y+2*grid.h,grid.w*9,grid.h*2);
}
}

// ===== 主循环 =====
function loop(){
drawBG();

// 植物
plants.forEach(p=>{
let use=img[p.t];

// 残雪坚果
if(p.t==='wallnut' && p.hp<800){
use=img.wallnut_dmg;
}

ctx.drawImage(use,p.x,p.y,75,85);

// 攻击
if(['pea','repeater','snowpea','threepeater'].includes(p.t) && Math.random()<0.02){
if(p.t==='threepeater'){
[-1,0,1].forEach(o=>{
let r=p.row+o;
if(r>=0&&r<5) bullets.push({x:p.x+60,y:p.y+20,row:r,type:p.t});
});
}else{
bullets.push({x:p.x+60,y:p.y+20,row:p.row,type:p.t});
if(p.t==='repeater') bullets.push({x:p.x+60,y:p.y+20,row:p.row,type:p.t});
}
}
});

// 子弹
bullets.forEach(b=>{
b.x+=6;
ctx.drawImage(img.bullet,b.x,b.y,20,20);
});

// 僵尸
if(Math.random()<0.02){
zombies.push({x:1000,row:Math.floor(Math.random()*5),hp:150});
}

zombies.forEach(z=>{
ctx.drawImage(img.zombie,z.x,grid.y+z.row*grid.h,80,90);
z.x-=0.4;

plants.forEach(p=>{
if(Math.abs(z.x-p.x)<40 && z.row===p.row){
p.hp-=1;
}
});
});

// 点击种植
cvs.onclick=e=>{
let mx=e.offsetX,my=e.offsetY;
let c=Math.floor((mx-grid.x)/grid.w);
let r=Math.floor((my-grid.y)/grid.h);

if(c<0||r<0||c>=9||r>=5) return;

let gx=grid.x+c*grid.w,gy=grid.y+r*grid.h;

// 水池限制
if(level==='pool' && (r===2||r===3)){
let hasPad=plants.find(p=>p.x===gx&&p.y===gy&&p.t==='lilypad');

if(active==='lilypad'){
plants.push({x:gx,y:gy,row:r,t:'lilypad',hp:300});
return;
}

if(!hasPad) return;
}

plants.push({x:gx,y:gy,row:r,t:active,hp:1500});
};

requestAnimationFrame(loop);
}
</script>

</body>
</html>
