<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>PVZ 纯代码增强版</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #222; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        #game-container { 
            position: relative; 
            width: 1000px; 
            height: 640px; 
            background: #45a049;
            border: 6px solid #3e2723; 
            box-sizing: border-box; 
            transform-origin: center; 
            overflow: hidden; 
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        #menu, #level-select { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #level-select { display: none; }
        .btn { padding: 12px 40px; margin: 10px; font-size: 20px; cursor: pointer; background: #4e342e; color: #fff; border: 2px solid #ff0; border-radius: 12px; min-width: 200px; text-align: center; }
        .btn:hover { background: #5d4037; }
        
        #toolbar { position: absolute; top: 5px; left: 5px; display: flex; gap: 5px; background: rgba(0,0,0,0.7); padding: 5px; border-radius: 5px; z-index: 10; border: 1px solid #444; align-items: center; flex-wrap: wrap; max-width: 650px; }
        .card { width: 62px; height: 85px; background: #555; border: 2px solid #333; cursor: pointer; text-align: center; position: relative; overflow: hidden; }
        .card.active { border-color: #0f0; background: #666; }
        .card.cooldown::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.6); height: var(--cd, 0%); }
        .card img { width: 38px; height: 38px; display: block; margin: 2px auto; pointer-events: none; }
        .cost { color: #ff0; font-weight: bold; font-size: 11px; }
        .name { font-size: 9px; color: #fff; white-space: nowrap; }

        #shovel { width: 65px; height: 65px; background: #444; border: 2px solid #888; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #shovel img { width: 50px; height: 50px; }
        #shovel.active { border-color: #f00; background: #722; transform: scale(1.1); }

        #sun-box { position: absolute; top: 10px; right: 20px; font-size: 24px; color: #ff0; font-weight: bold; z-index: 10; background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 15px; }
        canvas { display: block; touch-action: none; position: absolute; top:0; left:0; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu">
        <h2 style="color:#ff0; font-size: 32px;">PVZ · 纯代码增强版</h2>
        <div class="btn" onclick="showLevelSelect('normal')">正常模式</div>
        <div class="btn" onclick="showLevelSelect('mod')" style="color:#ff4444;">无限阳光</div>
    </div>

    <div id="level-select">
        <h3 style="color:#fff">选择关卡</h3>
        <div class="btn" onclick="start('grass')">青青草原 (陆地)</div>
        <div class="btn" onclick="start('pool')" style="color:#4fc3f7;">泳池派对 (水域)</div>
        <div class="btn" onclick="location.reload()" style="border-color:#888; font-size: 14px;">返回</div>
    </div>

    <div id="toolbar" style="display:none;">
        <div class="card active" id="card-pea" onclick="sel('pea', 100, this)"><img src="https://s1.aigei.com/prevfiles/0c48c399aa024288837b5db9214a7251.gif?e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:0MCPPPifyEncWX2yXeHcMKqtVa0="><div class="cost">100</div><div class="name">豌豆</div></div>
        <div class="card" id="card-threepeater" onclick="sel('threepeater', 325, this)"><img src="https://s1.chu0.com/prevfiles/297c79eb6ad8496eae9915741ff893fa.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:Voy_F3P8RV-sBOyIGDCdzzwedAQ="><div class="cost">325</div><div class="name">三发</div></div>
        <div class="card" id="card-snowpea" onclick="sel('snowpea', 175, this)"><img src="https://s1.chu0.com/src/img/gif/3b/3bb997567dce4673abc620d6f92b6943.gif"><div class="cost">175</div><div class="name">寒冰</div></div>
        <div class="card" id="card-wallnut" onclick="sel('wallnut', 50, this)"><img src="https://s1.chu0.com/prevfiles/649b5e337e454145809433788a1ee770.gif"><div class="cost">50</div><div class="name">坚果</div></div>
        <div class="card" id="card-sunflower" onclick="sel('sunflower', 50, this)"><img src="https://s1.aigei.com/prevfiles/1970c9beda3243949100b4eb9f4453f5.gif?e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:DSIZp4_WAt59X2K0B8EIQ7W21-o="><div class="cost">50</div><div class="name">向日葵</div></div>
        <div class="card" id="card-lilypad" onclick="sel('lilypad', 25, this)"><img src="https://s1.chu0.com/prevfiles/8de79375fe824a228419c38c40351877.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:YaWZC9DFNXKkd3gJqgoN8NxhICY="><div class="cost">25</div><div class="name">荷叶</div></div>
        <div class="card" id="card-squash" onclick="sel('squash', 50, this)"><img src="https://s1.chu0.com/prevfiles/e322eb1cbd3c4629887638b3cde1435d.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:JRDVjB_ANh2k6wa6tC_ZBPBCq7U="><div class="cost">50</div><div class="name">倭瓜</div></div>
        <div id="shovel" onclick="useShovel()"><img src="https://simg.doyo.cn/imgfile/bgame/202502/14173649szcp.png"></div>
    </div>

    <div id="sun-box" style="display:none;">☀️ <span id="sun-val">150</span></div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
const container = document.getElementById('game-container');
const cvs = document.getElementById('gameCanvas');
const ctx = cvs.getContext('2d');
cvs.width = 1000; cvs.height = 640;

function resize() {
    const scale = Math.min(window.innerWidth / 1000, window.innerHeight / 640);
    container.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', resize); resize();

const img = {};
const load = (k, v) => { img[k] = new Image(); img[k].src = v; };
load('pea', "https://s1.aigei.com/prevfiles/0c48c399aa024288837b5db9214a7251.gif?e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:0MCPPPifyEncWX2yXeHcMKqtVa0=");
load('threepeater', "https://s1.chu0.com/prevfiles/297c79eb6ad8496eae9915741ff893fa.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:Voy_F3P8RV-sBOyIGDCdzzwedAQ=");
load('snowpea', "https://s1.chu0.com/src/img/gif/3b/3bb997567dce4673abc620d6f92b6943.gif");
load('wallnut', "https://s1.chu0.com/prevfiles/649b5e337e454145809433788a1ee770.gif");
load('wallnut_cracked', "https://s1.chu0.com/prevfiles/c0c1c79695bc4d189deae85b9a545c6c.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:n0MPNeSLBJGqYFWb3LtWHKJEqGw=");
load('sunflower', "https://s1.aigei.com/prevfiles/1970c9beda3243949100b4eb9f4453f5.gif?e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:DSIZp4_WAt59X2K0B8EIQ7W21-o=");
load('lilypad', "https://s1.chu0.com/prevfiles/8de79375fe824a228419c38c40351877.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:YaWZC9DFNXKkd3gJqgoN8NxhICY=");
load('squash', "https://s1.chu0.com/prevfiles/e322eb1cbd3c4629887638b3cde1435d.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:JRDVjB_ANh2k6wa6tC_ZBPBCq7U=");
load('sun', "https://s1.chu0.com/prevfiles/c5df756ba71b4cc192efa14b8320f64b.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:qr3Mhje4FeFBSERkl_AU6GNJEuw=");
load('zombie', "https://s1.chu0.com/prevfiles/96eaef96cd134f3c9c9c9e6c20185022.gif");
load('peabullet', "https://s1.chu0.com/prevfiles/e527151f9bcb43acb57d8d5b11a25098.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:o_m__m56SDyi9wc8MXP988tzn00=");

let sun = 150, gameMode = 'normal', levelType = 'grass', activeP = 'pea', activeC = 100, isShovel = false;
let plants = [], zombies = [], bullets = [], suns = [], running = false, frame = 0;
const cooldowns = { pea:0, threepeater:0, snowpea:0, wallnut:0, sunflower:0, lilypad:0, squash:0 };
const CD_MAX = { pea:90, threepeater:200, snowpea:150, wallnut:400, sunflower:90, lilypad:60, squash:400 };
const grid = { x: 140, y: 100, w: 85, h: 100, rows: 5, cols: 9 }; 

function showLevelSelect(m) {
    gameMode = m;
    document.getElementById('menu').style.display = 'none';
    document.getElementById('level-select').style.display = 'flex';
}

function start(lt) {
    levelType = lt;
    sun = (gameMode === 'mod') ? 999999 : 150;
    document.getElementById('sun-val').innerText = (gameMode==='mod'?'∞':sun);
    document.getElementById('level-select').style.display = 'none';
    document.getElementById('toolbar').style.display = 'flex';
    document.getElementById('sun-box').style.display = 'block';
    running = true; loop();
}

function drawBackground() {
    ctx.fillStyle = levelType === 'grass' ? "#4caf50" : "#2196f3";
    ctx.fillRect(0, 0, 1000, 640);
    ctx.fillStyle = levelType === 'grass' ? "#388e3c" : "#0288d1";
    ctx.fillRect(0, 0, 140, 640);

    for(let r=0; r<grid.rows; r++) {
        for(let c=0; c<grid.cols; c++) {
            if(levelType === 'pool' && (r === 2 || r === 3)) {
                ctx.fillStyle = (r + c) % 2 === 0 ? "#03a9f4" : "#29b6f6";
            } else {
                ctx.fillStyle = (r + c) % 2 === 0 ? "#45a049" : "#4caf50";
            }
            ctx.fillRect(grid.x + c*grid.w, grid.y + r*grid.h, grid.w, grid.h);
        }
    }
}

function sel(t, c, el) {
    isShovel = false; 
    document.getElementById('shovel').classList.remove('active');
    activeP = t; activeC = c;
    document.querySelectorAll('.card').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
}

function useShovel() {
    isShovel = !isShovel;
    document.getElementById('shovel').classList.toggle('active', isShovel);
    if(isShovel) { activeP = null; document.querySelectorAll('.card').forEach(i => i.classList.remove('active')); }
}

function loop() {
    if(!running) return;
    drawBackground();

    for(let k in cooldowns) if(cooldowns[k]>0) {
        cooldowns[k]--;
        document.getElementById('card-'+k).style.setProperty('--cd', (cooldowns[k]/CD_MAX[k]*100)+'%');
    }

    plants.forEach((p, pi) => {
        let drawImg = img[p.t];
        // 坚果残血形态逻辑
        if(p.t === 'wallnut' && p.hp < 1000) drawImg = img['wallnut_cracked'];
        
        if(drawImg && drawImg.complete) {
            let offset = (p.t === 'lilypad') ? 20 : 0;
            ctx.drawImage(drawImg, p.x+5, p.y+10+offset, 75, 85);
        }
        p.timer++;
        
        if(p.t === 'sunflower' && p.timer % 400 === 0) suns.push({x: p.x+10, y: p.y, vy: -3, targetY: p.y+40, life: 500});
        
        if(p.timer % 90 === 0) {
            if(zombies.some(z => z.x > p.x && z.row >= p.row-1 && z.row <= p.row+1)) {
                if(p.t === 'pea') bullets.push({x: p.x+60, y: p.y+20, row: p.row, t: 'normal'});
                if(p.t === 'snowpea') bullets.push({x: p.x+60, y: p.y+20, row: p.row, t: 'ice'});
                if(p.t === 'threepeater') {
                    [p.row-1, p.row, p.row+1].forEach(r => {
                        if(r>=0 && r<5) bullets.push({x: p.x+60, y: grid.y + r*grid.h + 20, row: r, t: 'normal'});
                    });
                }
            }
        }
    });

    bullets.forEach((b, bi) => {
        b.x += 8;
        if(b.t === 'ice') { ctx.fillStyle="#00f2ff"; ctx.beginPath(); ctx.arc(b.x+15, b.y+15, 10, 0, 7); ctx.fill(); }
        else { ctx.drawImage(img.peabullet, b.x, b.y, 35, 35); }
        
        zombies.forEach(z => {
            if(b.x > z.x && b.x < z.x+60 && b.row === z.row) {
                z.hp -= 20; if(b.t==='ice') z.slow = 120;
                bullets.splice(bi, 1);
            }
        });
        if(b.x > 1000) bullets.splice(bi, 1);
    });

    if(frame % 300 === 0) suns.push({x: Math.random()*500+300, y: -50, vy: 1.5, targetY: 480, life: 600});
    suns.forEach((s, si) => {
        if(img.sun.complete) ctx.drawImage(img.sun, s.x, s.y, 65, 65);
        if(s.y < s.targetY) s.y += s.vy;
        s.life--; if(s.life <= 0) suns.splice(si, 1);
    });

    if(frame % 250 === 0) zombies.push({x: 1000, row: Math.floor(Math.random()*5), hp: 150, slow: 0});
    zombies.forEach((z, zi) => {
        let speed = (z.slow > 0) ? 0.35 : 0.75;
        ctx.drawImage(img.zombie, z.x, grid.y + z.row*grid.h, 90, 90);
        let eating = false;
        plants.forEach((p, pi) => {
            if(z.x < p.x+35 && z.x > p.x-20 && z.row === p.row && p.t !== 'lilypad') {
                eating = true; p.hp -= 1.5;
                if(p.t === 'squash') { z.hp -= 2000; plants.splice(pi, 1); }
                if(p.hp <= 0) plants.splice(pi, 1);
            }
        });
        if(!eating) z.x -= speed;
        if(z.hp <= 0) zombies.splice(zi, 1);
        if(z.x < 100) { running = false; alert('僵尸吃掉了你的脑子！'); location.reload(); }
    });

    frame++; requestAnimationFrame(loop);
}

function handleInput(clientX, clientY) {
    const rect = container.getBoundingClientRect();
    const scale = rect.width / 1000;
    const mx = (clientX - rect.left) / scale, my = (clientY - rect.top) / scale;

    for(let i=0; i<suns.length; i++) {
        let s = suns[i];
        if(mx > s.x && mx < s.x+70 && my > s.y && my < s.y+70) {
            suns.splice(i, 1); sun += (gameMode==='mod'?0:25);
            document.getElementById('sun-val').innerText = (gameMode==='mod'?'∞':sun); return;
        }
    }

    const c = Math.floor((mx - grid.x) / grid.w), r = Math.floor((my - grid.y) / grid.h);
    if(c >= 0 && c < grid.cols && r >= 0 && r < grid.rows) {
        const gx = grid.x + c*grid.w, gy = grid.y + r*grid.h;
        const targetIdx = plants.findIndex(p => p.x === gx && p.y === gy && p.t !== 'lilypad');
        const padIdx = plants.findIndex(p => p.x === gx && p.y === gy && p.t === 'lilypad');
        
        if(isShovel) {
            if(targetIdx !== -1) plants.splice(targetIdx, 1);
            else if(padIdx !== -1) plants.splice(padIdx, 1);
            return;
        }
        
        if(activeP) {
            const isWater = (levelType === 'pool' && (r === 2 || r === 3));
            if(isWater && activeP !== 'lilypad' && padIdx === -1) return;
            if(!isWater && activeP === 'lilypad') return;
            
            if(targetIdx === -1 || (activeP !== 'lilypad' && padIdx !== -1 && targetIdx === -1)) {
                if((sun >= activeC && cooldowns[activeP] <= 0) || gameMode === 'mod') {
                    let hp = (activeP === 'wallnut') ? 3000 : 150;
                    plants.push({x: gx, y: gy, row: r, t: activeP, hp: hp, timer: 0});
                    if(gameMode !== 'mod') { sun -= activeC; cooldowns[activeP] = CD_MAX[activeP]; document.getElementById('sun-val').innerText = sun; }
                }
            }
        }
    }
}

cvs.addEventListener('mousedown', (e) => handleInput(e.clientX, e.clientY));
cvs.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e.touches[0].clientX, e.touches[0].clientY); });
</script>
</body>
</html>
