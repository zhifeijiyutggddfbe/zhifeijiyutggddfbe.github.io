<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PVZ: Cyber Edition</title>
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #game-wrapper { position: relative; width: 900px; height: 600px; margin: 20px auto; border: 3px solid #00f2ff; box-shadow: 0 0 20px #00f2ff; }
        canvas { background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%); display: block; }
        
        /* UI 样式 */
        #toolbar { position: absolute; top: 10px; left: 10px; display: flex; gap: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; border: 1px solid #39ff14; }
        .card { width: 60px; height: 80px; border: 2px solid #555; background: #222; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; }
        .card.active { border-color: #39ff14; box-shadow: 0 0 10px #39ff14; }
        .card img { width: 40px; pointer-events: none; }
        
        #stats { position: absolute; top: 10px; right: 10px; font-weight: bold; color: #39ff14; text-shadow: 0 0 5px #39ff14; font-size: 20px; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="toolbar">
        <div class="card active" onclick="selectPlant('peashooter', this)">
            <div style="color:#39ff14">豌豆</div>
            <div>100</div>
        </div>
        <div class="card" onclick="selectPlant('sunflower', this)">
            <div style="color:#ffee00">向日葵</div>
            <div>50</div>
        </div>
        <div class="card" onclick="selectPlant('wallnut', this)">
            <div style="color:#ffae00">坚果</div>
            <div>50</div>
        </div>
    </div>
    <div id="stats">SUN: <span id="sun-val">150</span></div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
/**
 * 游戏配置与数据定义
 * 你可以在这里添加原版的所有植物和僵尸数据
 */
const CONFIG = {
    plants: {
        peashooter: { hp: 100, cost: 100, icon: '🟢', shootSpeed: 60, color: '#39ff14' },
        sunflower: { hp: 100, cost: 50, icon: '🌻', sunSpeed: 300, color: '#ffee00' },
        wallnut: { hp: 1000, cost: 50, icon: '🛡️', color: '#ffae00' }
    },
    zombies: {
        normal: { hp: 100, speed: 0.4, damage: 1, icon: '🧟', color: '#ff3131' },
        conehead: { hp: 250, speed: 0.35, damage: 1, icon: '🗼', color: '#ff7700' }
    }
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 900;
canvas.height = 600;

let sun = 150;
let selectedPlant = 'peashooter';
let gameFrame = 0;
const grid = { rows: 5, cols: 9, cellSize: 90, startX: 50, startY: 100 };

const plants = [];
const zombies = [];
const projectiles = [];
const particles = [];

// 选择植物
window.selectPlant = (type, el) => {
    selectedPlant = type;
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
};

// 工具函数：绘制发光文字/图标
function drawNeonText(text, x, y, color, size = "30px") {
    ctx.shadowBlur = 15;
    ctx.shadowColor = color;
    ctx.fillStyle = color;
    ctx.font = `${size} Arial`;
    ctx.fillText(text, x, y);
    ctx.shadowBlur = 0;
}

class Plant {
    constructor(x, y, type) {
        this.x = x; this.y = y;
        this.type = type;
        this.data = CONFIG.plants[type];
        this.hp = this.data.hp;
        this.timer = 0;
    }
    update() {
        this.timer++;
        // 豌豆射击逻辑
        if (this.type === 'peashooter' && this.timer % this.data.shootSpeed === 0) {
            projectiles.push({ x: this.x + 50, y: this.y + 45, speed: 5 });
        }
        // 向日葵产阳光
        if (this.type === 'sunflower' && this.timer % this.data.sunSpeed === 0) {
            sun += 25;
            document.getElementById('sun-val').innerText = sun;
        }
    }
    draw() {
        drawNeonText(this.data.icon, this.x + 25, this.y + 55, this.data.color);
    }
}

class Zombie {
    constructor(row) {
        this.x = canvas.width;
        this.y = grid.startY + row * grid.cellSize;
        this.type = 'normal';
        this.data = CONFIG.zombies.normal;
        this.hp = this.data.hp;
        this.eating = false;
    }
    update() {
        if (!this.eating) this.x -= this.data.speed;
        
        // 简单碰撞检测：是否在吃植物
        this.eating = false;
        plants.forEach((p, index) => {
            if (this.x < p.x + 50 && this.x > p.x && this.y === p.y) {
                this.eating = true;
                p.hp -= this.data.damage;
                if (p.hp <= 0) plants.splice(index, 1);
            }
        });
    }
    draw() {
        drawNeonText(this.data.icon, this.x, this.y + 60, this.data.color, "40px");
    }
}

// 核心循环
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 1. 绘制草坪 (网格)
    ctx.strokeStyle = 'rgba(0, 242, 255, 0.1)';
    for(let r=0; r<grid.rows; r++) {
        for(let c=0; c<grid.cols; c++) {
            ctx.strokeRect(grid.startX + c*grid.cellSize, grid.startY + r*grid.cellSize, grid.cellSize, grid.cellSize);
        }
    }

    // 2. 更新/绘制植物
    plants.forEach(p => { p.update(); p.draw(); });

    // 3. 更新/绘制僵尸
    if (gameFrame % 300 === 0) zombies.push(new Zombie(Math.floor(Math.random()*5)));
    zombies.forEach((z, i) => {
        z.update();
        z.draw();
        if (z.hp <= 0) zombies.splice(i, 1);
    });

    // 4. 更新/绘制子弹
    projectiles.forEach((proj, i) => {
        proj.x += proj.speed;
        drawNeonText('●', proj.x, proj.y, '#39ff14', '15px');
        
        // 击中检测
        zombies.forEach(z => {
            if (proj.x > z.x && proj.x < z.x + 40 && proj.y > z.y && proj.y < z.y + 90) {
                z.hp -= 20;
                projectiles.splice(i, 1);
            }
        });
        if (proj.x > canvas.width) projectiles.splice(i, 1);
    });

    gameFrame++;
    requestAnimationFrame(animate);
}

// 种植交互
canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    
    const col = Math.floor((mx - grid.startX) / grid.cellSize);
    const row = Math.floor((my - grid.startY) / grid.cellSize);
    
    if (col >= 0 && col < grid.cols && row >= 0 && row < grid.rows) {
        const gx = grid.startX + col * grid.cellSize;
        const gy = grid.startY + row * grid.cellSize;
        
        // 检查重复种植
        if (plants.some(p => p.x === gx && p.y === gy)) return;

        const cost = CONFIG.plants[selectedPlant].cost;
        if (sun >= cost) {
            plants.push(new Plant(gx, gy, selectedPlant));
            sun -= cost;
            document.getElementById('sun-val').innerText = sun;
        }
    }
});

animate();
</script>
</body>
</html>
