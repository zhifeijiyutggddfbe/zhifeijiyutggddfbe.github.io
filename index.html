<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>PVZ 关卡选择版</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #222; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        #game-container { 
            position: relative; 
            width: 1000px; 
            height: 640px; 
            background: #45a049; 
            border: 6px solid #3e2723; 
            box-sizing: border-box; 
            transform-origin: center; 
            overflow: hidden; 
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        /* UI 层级 */
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
        .hidden { display: none !important; }
        .btn { padding: 15px 40px; margin: 10px; font-size: 20px; cursor: pointer; background: #4e342e; color: #fff; border: 3px solid #ff0; border-radius: 12px; transition: 0.2s; }
        .btn:hover { background: #6d4c41; transform: scale(1.05); }
        
        /* 工具栏 */
        #toolbar { position: absolute; top: 5px; left: 5px; display: flex; gap: 4px; background: rgba(0,0,0,0.7); padding: 5px; border-radius: 5px; z-index: 10; border: 1px solid #444; align-items: center; }
        .card { width: 62px; height: 85px; background: #555; border: 2px solid #333; cursor: pointer; text-align: center; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .card.active { border-color: #0f0; background: #666; }
        .card.cooldown::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.7); height: var(--cd, 0%); }
        .card img { width: 40px; height: 40px; display: block; margin: 2px auto; pointer-events: none; }
        .cost { color: #ff0; font-weight: bold; font-size: 11px; margin-top: auto; }
        .name { font-size: 9px; color: #fff; margin-bottom: 2px; }

        #shovel { width: 60px; height: 60px; background: #444; border: 2px solid #888; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-left: 5px; }
        #shovel img { width: 45px; height: 45px; }
        #shovel.active { border-color: #f00; background: #722; }

        #sun-box { position: absolute; top: 10px; right: 20px; font-size: 24px; color: #ff0; font-weight: bold; z-index: 10; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; border: 2px solid #ffd700; }
        canvas { display: block; touch-action: none; position: absolute; top:0; left:0; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu-main" class="overlay">
        <h1 style="color:#ff0; font-size: 48px; text-shadow: 2px 2px #000;">PVZ 纯代码加强版</h1>
        <div class="btn" onclick="showLevelSelect('normal')">正常模式</div>
        <div class="btn" onclick="showLevelSelect('mod')" style="color:#ff4444;">无限阳光</div>
    </div>

    <div id="menu-level" class="overlay hidden">
        <h2 style="color:#fff;">选择关卡</h2>
        <div class="btn" onclick="startGame(1)">关卡 1：白天草地</div>
        <div class="btn" onclick="startGame(2)" style="border-color: #2196f3;">关卡 2：泳池水路</div>
        <div class="btn" style="font-size: 14px; background: #333; border-color: #777;" onclick="location.reload()">返回主菜单</div>
    </div>

    <div id="game-ui" class="hidden">
        <div id="toolbar">
            <div class="card active" id="card-lilypad" onclick="sel('lilypad', 25, this)"><img src="https://s1.chu0.com/prevfiles/8de79375fe824a228419c38c40351877.gif"><div class="cost">25</div><div class="name">荷叶</div></div>
            <div class="card" id="card-pea" onclick="sel('pea', 100, this)"><img src="https://s1.aigei.com/prevfiles/0c48c399aa024288837b5db9214a7251.gif"><div class="cost">100</div><div class="name">豌豆</div></div>
            <div class="card" id="card-threepeater" onclick="sel('threepeater', 325, this)"><img src="https://s1.chu0.com/prevfiles/297c79eb6ad8496eae9915741ff893fa.gif"><div class="cost">325</div><div class="name">三发</div></div>
            <div class="card" id="card-snownut" onclick="sel('snownut', 125, this)"><img src="https://s1.chu0.com/prevfiles/c0c1c79695bc4d189deae85b9a545c6c.gif"><div class="cost">125</div><div class="name">雪坚果</div></div>
            <div class="card" id="card-sunflower" onclick="sel('sunflower', 50, this)"><img src="https://s1.aigei.com/prevfiles/1970c9beda3243949100b4eb9f4453f5.gif"><div class="cost">50</div><div class="name">向日葵</div></div>
            <div class="card" id="card-cherry" onclick="sel('cherry', 150, this)"><img src="https://s1.aigei.com/prevfiles/5a4686e74c374bac930c5ebaebda4a12.gif"><div class="cost">150</div><div class="name">樱桃</div></div>
            <div id="shovel" onclick="useShovel()"><img src="https://simg.doyo.cn/imgfile/bgame/202502/14173649szcp.png"></div>
        </div>
        <div id="sun-box">☀️ <span id="sun-val">150</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
// --- 资源加载 ---
const img = {};
const load = (k, v) => { img[k] = new Image(); img[k].src = v; };
load('lilypad', "https://s1.chu0.com/prevfiles/8de79375fe824a228419c38c40351877.gif");
load('pea', "https://s1.aigei.com/prevfiles/0c48c399aa024288837b5db9214a7251.gif");
load('threepeater', "https://s1.chu0.com/prevfiles/297c79eb6ad8496eae9915741ff893fa.gif");
load('snownut', "https://s1.chu0.com/prevfiles/c0c1c79695bc4d189deae85b9a545c6c.gif");
load('sunflower', "https://s1.aigei.com/prevfiles/1970c9beda3243949100b4eb9f4453f5.gif");
load('cherry', "https://s1.aigei.com/prevfiles/5a4686e74c374bac930c5ebaebda4a12.gif");
load('pbone', "https://s1.chu0.com/prevfiles/e527151f9bcb43acb57d8d5b11a25098.gif"); // 豌豆子弹
load('sun', "https://s1.chu0.com/prevfiles/c5df756ba71b4cc192efa14b8320f64b.gif");
load('zombie', "https://s1.chu0.com/prevfiles/96eaef96cd134f3c9c9c9e6c20185022.gif");
load('boom', "https://s1.chu0.com/prevfiles/cf167a87e9f14411ae7734c039d81d9f.gif");

// --- 游戏变量 ---
const cvs = document.getElementById('gameCanvas');
const ctx = cvs.getContext('2d');
cvs.width = 1000; cvs.height = 640;

let currentMode = 'normal';
let currentLevel = 1; // 1: 草地, 2: 泳池
let sun = 150, running = false, frame = 0;
let activeP = 'pea', activeC = 100, isShovel = false;
let plants = [], zombies = [], bullets = [], suns = [], effects = [];

const grid = { x: 140, y: 100, w: 85, h: 100, rows: 5, cols: 9 };
const cooldowns = { lilypad:0, pea:0, threepeater:0, snownut:0, sunflower:0, cherry:0 };
const CD_MAX = { lilypad:100, pea:100, threepeater:200, snownut:400, sunflower:100, cherry:800 };

function showLevelSelect(mode) {
    currentMode = mode;
    document.getElementById('menu-main').classList.add('hidden');
    document.getElementById('menu-level').classList.remove('hidden');
}

function startGame(level) {
    currentLevel = level;
    sun = (currentMode === 'mod') ? 99999 : 150;
    document.getElementById('sun-val').innerText = (currentMode==='mod'?'∞':sun);
    document.getElementById('menu-level').classList.add('hidden');
    document.getElementById('game-ui').classList.remove('hidden');
    running = true;
    loop();
}

function drawGrid() {
    ctx.fillStyle = "#388e3c"; ctx.fillRect(0, 0, 140, 640); // 侧边
    for(let r=0; r<grid.rows; r++) {
        for(let c=0; c<grid.cols; c++) {
            let isWater = (currentLevel === 2 && (r === 2 || r === 3)); // 泳池关卡中间两行是水
            ctx.fillStyle = isWater ? ((r+c)%2===0 ? "#2979ff":"#2196f3") : ((r+c)%2===0 ? "#45a049":"#4caf50");
            ctx.fillRect(grid.x + c*grid.w, grid.y + r*grid.h, grid.w, grid.h);
        }
    }
}

function loop() {
    if(!running) return;
    ctx.clearRect(0,0,1000,640);
    drawGrid();

    // 冷却逻辑
    for(let k in cooldowns) if(cooldowns[k]>0) {
        cooldowns[k]--;
        document.getElementById('card-'+k).style.setProperty('--cd', (cooldowns[k]/CD_MAX[k]*100)+'%');
    }

    // 植物
    plants.forEach((p, pi) => {
        if(img[p.t].complete) {
            if(p.t === 'lilypad') ctx.drawImage(img[p.t], p.x+5, p.y+15, 75, 70);
            else ctx.drawImage(img[p.t], p.x+5, p.y+5, 75, 85);
        }
        p.timer++;
        // 樱桃炸弹
        if(p.t === 'cherry' && p.timer > 50) {
            effects.push({x: p.x-80, y: p.y-80, t:'boom', life:30});
            zombies.forEach(z => { if(Math.abs(z.x-p.x)<180 && Math.abs(z.row-p.row)<=1) z.hp -= 2000; });
            plants.splice(pi, 1);
        }
        // 生产阳光
        if(p.t === 'sunflower' && p.timer % 400 === 0) suns.push({x:p.x, y:p.y, vy:-2, ty:p.y+30, life:500});
        // 射击
        if(p.timer % 90 === 0) {
            let hasZ = (p.t === 'threepeater') ? 
                zombies.some(z => Math.abs(z.row-p.row)<=1 && z.x > p.x) : 
                zombies.some(z => z.row === p.row && z.x > p.x);
            if(hasZ) {
                if(p.t==='pea') bullets.push({x:p.x+50, y:p.y+20, row:p.row});
                if(p.t==='threepeater') {
                    [p.row-1, p.row, p.row+1].forEach(r => {
                        if(r>=0 && r<5) bullets.push({x:p.x+50, y:p.y+20 + (r-p.row)*grid.h, row:r});
                    });
                }
            }
        }
    });

    // 子弹
    bullets.forEach((b, bi) => {
        b.x += 7;
        if(img.pbone.complete) ctx.drawImage(img.pbone, b.x, b.y, 35, 35);
        zombies.forEach(z => {
            if(z.row === b.row && b.x > z.x && b.x < z.x+60) { z.hp -= 20; bullets.splice(bi, 1); }
        });
        if(b.x > 1000) bullets.splice(bi, 1);
    });

    // 阳光
    if(frame % 300 === 0) suns.push({x: Math.random()*600+200, y:-50, vy:1, ty: Math.random()*300+150, life:600});
    suns.forEach((s, si) => {
        if(img.sun.complete) ctx.drawImage(img.sun, s.x, s.y, 60, 60);
        if(s.y < s.ty) s.y += s.vy;
        s.life--; if(s.life <= 0) suns.splice(si, 1);
    });

    // 僵尸
    if(frame % 240 === 0) zombies.push({x:1000, row: Math.floor(Math.random()*5), hp:200, slow:0});
    zombies.forEach((z, zi) => {
        if(z.slow > 0) z.slow--;
        let speed = (z.slow > 0) ? 0.3 : 0.7;
        if(img.zombie.complete) ctx.drawImage(img.zombie, z.x, grid.y + z.row*grid.h, 85, 85);
        let eating = false;
        plants.forEach(p => {
            if(p.row === z.row && z.x < p.x+40 && z.x > p.x-20) {
                if(p.t === 'lilypad' && plants.some(top => top.x===p.x && top.y===p.y && top.t!=='lilypad')) return;
                eating = true; p.hp -= 1;
                if(p.t === 'snownut') z.slow = 3; 
                if(p.hp <= 0) plants.splice(plants.indexOf(p), 1);
            }
        });
        if(!eating) z.x -= speed;
        if(z.hp <= 0) zombies.splice(zi, 1);
        if(z.x < 110) { running = false; alert("僵尸吃了你的脑子！"); location.reload(); }
    });

    effects.forEach((e, ei) => {
        if(img.boom.complete) ctx.drawImage(img.boom, e.x, e.y, 200, 200);
        e.life--; if(e.life<=0) effects.splice(ei, 1);
    });

    frame++;
    requestAnimationFrame(loop);
}

// 交互
function sel(t, c, el) {
    isShovel = false; document.getElementById('shovel').classList.remove('active');
    activeP = t; activeC = c;
    document.querySelectorAll('.card').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
}
function useShovel() {
    isShovel = true; activeP = null;
    document.querySelectorAll('.card').forEach(i => i.classList.remove('active'));
    document.getElementById('shovel').classList.add('active');
}

cvs.addEventListener('mousedown', e => {
    const rect = cvs.getBoundingClientRect();
    const scale = rect.width / 1000;
    const mx = (e.clientX - rect.left) / scale, my = (e.clientY - rect.top) / scale;

    // 阳光
    suns.forEach((s, i) => {
        if(mx > s.x && mx < s.x+60 && my > s.y && my < s.y+60) {
            suns.splice(i,1); if(currentMode!=='mod') sun+=25;
            document.getElementById('sun-val').innerText = (currentMode==='mod'?'∞':sun);
        }
    });

    const c = Math.floor((mx - grid.x)/grid.w), r = Math.floor((my - grid.y)/grid.h);
    if(c>=0 && c<9 && r>=0 && r<5) {
        const gx = grid.x + c*grid.w, gy = grid.y + r*grid.h;
        const lily = plants.find(p => p.x===gx && p.y===gy && p.t==='lilypad');
        const top = plants.find(p => p.x===gx && p.y===gy && p.t!=='lilypad');

        if(isShovel) {
            if(top) plants.splice(plants.indexOf(top), 1);
            else if(lily) plants.splice(plants.indexOf(lily), 1);
        } else if(activeP && (sun >= activeC || currentMode==='mod')) {
            if(cooldowns[activeP] > 0 && currentMode!=='mod') return;
            let isWater = (currentLevel === 2 && (r===2 || r===3));
            if(isWater) {
                if(activeP==='lilypad' && !lily) spawn(gx,gy,r,'lilypad',150);
                else if(lily && !top && activeP!=='lilypad') spawn(gx,gy,r,activeP, activeP==='snownut'?4000:150);
            } else {
                if(!top && activeP!=='lilypad') spawn(gx,gy,r,activeP, activeP==='snownut'?4000:150);
            }
        }
    }
});

function spawn(x,y,r,t,hp) {
    plants.push({x,y,row:r,t,hp,timer:0});
    if(currentMode!=='mod') {
        sun -= activeC; cooldowns[activeP] = CD_MAX[activeP];
        document.getElementById('sun-val').innerText = sun;
    }
}

// 适配屏幕
function handleResize() {
    const scale = Math.min(window.innerWidth / 1000, window.innerHeight / 640);
    container.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', handleResize); handleResize();
</script>
</body>
</html>
