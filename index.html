<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PVZ: Neon Fire Edition</title>
    <style>
        body { margin: 0; background: #020202; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        #game-wrapper { position: relative; width: 900px; height: 600px; margin: 20px auto; border: 2px solid #ff4e00; border-radius: 10px; box-shadow: 0 0 30px rgba(255, 78, 0, 0.3); }
        canvas { background: #080808; display: block; cursor: url('https://www.google.com/intl/en_ALL/mapfiles/openhand.cur'), auto; }
        
        #toolbar { 
            position: absolute; top: 15px; left: 15px; display: flex; gap: 10px; 
            background: rgba(0, 0, 0, 0.9); padding: 10px; border-radius: 12px; border: 1px solid #ff4e00;
        }
        .card { 
            width: 65px; height: 90px; border: 2px solid #333; background: #111; 
            cursor: pointer; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; transition: 0.2s; border-radius: 6px;
        }
        .card.active { border-color: #ff4e00; box-shadow: 0 0 15px #ff4e00; }
        .card img { width: 45px; height: 45px; object-fit: contain; }
        .card-cost { font-size: 13px; font-weight: bold; color: #ffee00; margin-top: 5px; }

        #stats { position: absolute; top: 20px; right: 25px; font-size: 26px; color: #ffee00; text-shadow: 0 0 10px #ffae00; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="toolbar">
        <div class="card active" onclick="selectPlant('gatling', this)">
            <img src="https://s1.chu0.com/prevfiles/6be92260c6424d28a7a8aade07cb23d8.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:uyjC9ovXHEXnBTuVGr7eOYbuaKE=">
            <div class="card-cost">250</div>
        </div>
        <div class="card" onclick="selectPlant('sunflower', this)">
            <img src="https://s1.aigei.com/prevfiles/6aa0a6c2859140a4bdc6d0be549b14ab.gif?e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:fvgavb968yQ0bJRvg12vXkeTkaU=">
            <div class="card-cost">50</div>
        </div>
        <div class="card" onclick="selectPlant('wallnut', this)">
            <img src="https://s1.chu0.com/prevfiles/649b5e337e454145809433788a1ee770.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:V93k8K3F7L8ghzzMvEP6jiWjB3o=">
            <div class="card-cost">50</div>
        </div>
    </div>
    <div id="stats">☀️ <span id="sun-val">250</span></div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
const assets = {};
const load = (n, s) => { assets[n] = new Image(); assets[n].src = s; };

// 载入你提供的所有资源
load('gatling', "https://s1.chu0.com/prevfiles/6be92260c6424d28a7a8aade07cb23d8.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:uyjC9ovXHEXnBTuVGr7eOYbuaKE=");
load('sunflower', "https://s1.aigei.com/prevfiles/6aa0a6c2859140a4bdc6d0be549b14ab.gif?e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:fvgavb968yQ0bJRvg12vXkeTkaU=");
load('wallnut', "https://s1.chu0.com/prevfiles/649b5e337e454145809433788a1ee770.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:V93k8K3F7L8ghzzMvEP6jiWjB3o=");
load('fireball', "https://s1.chu0.com/prevfiles/53666e346fc2405e8379faf2dd9aa31f.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:NMaacLsFpckzvHGLDn-5VOb1xDg=");
load('sun', "https://s1.aigei.com/prevfiles/4ac22e384ba04c15a36108f052c69eb6.gif?e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:IQIKlel_Liga0dzYzUYyAIHwL5g=");

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 900; canvas.height = 600;

let sunCount = 250;
let selectedPlant = 'gatling';
let gameFrame = 0;
const grid = { rows: 5, cols: 9, cellSize: 95, startX: 40, startY: 100 };
const plants = [], zombies = [], projectiles = [], suns = [];

class Plant {
    constructor(x, y, type) {
        this.x = x; this.y = y; this.type = type;
        this.hp = type === 'wallnut' ? 2000 : 150;
        this.timer = 0;
    }
    update() {
        this.timer++;
        if (this.type === 'gatling' && this.timer % 15 === 0) {
            projectiles.push({ x: this.x + 60, y: this.y + 15, w: 60, h: 40 });
        }
        if (this.type === 'sunflower' && this.timer % 300 === 0) {
            suns.push(new Sun(this.x + Math.random()*40, this.y + Math.random()*40));
        }
    }
    draw() {
        ctx.drawImage(assets[this.type], this.x + 10, this.y + 10, 75, 75);
    }
}

class Sun {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.life = 400; // 自动消失时间
        this.size = 50;
    }
    draw() {
        ctx.drawImage(assets.sun, this.x, this.y, this.size, this.size);
    }
}

class Zombie {
    constructor(row) {
        this.x = canvas.width;
        this.y = grid.startY + row * grid.cellSize;
        this.hp = 200;
        this.isEating = false;
    }
    update() {
        this.isEating = false;
        plants.forEach((p, i) => {
            if (this.x < p.x + 50 && this.x > p.x && this.y === p.y) {
                this.isEating = true;
                p.hp -= 1.5;
                if (p.hp <= 0) plants.splice(i, 1);
            }
        });
        if (!this.isEating) this.x -= 0.6;
    }
    draw() {
        ctx.font = "40px Arial";
        ctx.fillText('🧟', this.x, this.y + 65);
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 1. 绘制草坪
    ctx.strokeStyle = 'rgba(255, 78, 0, 0.1)';
    for(let r=0; r<grid.rows; r++) {
        for(let c=0; c<grid.cols; c++) ctx.strokeRect(grid.startX + c*grid.cellSize, grid.startY + r*grid.cellSize, grid.cellSize, grid.cellSize);
    }

    // 2. 阳光逻辑 (拾取检测)
    suns.forEach((s, i) => {
        s.draw();
        s.life--;
        if (s.life <= 0) suns.splice(i, 1);
    });

    // 3. 植物与僵尸
    plants.forEach(p => { p.update(); p.draw(); });
    if (gameFrame % 240 === 0) zombies.push(new Zombie(Math.floor(Math.random()*5)));
    zombies.forEach((z, i) => {
        z.update();
        z.draw();
        if (z.hp <= 0) zombies.splice(i, 1);
    });

    // 4. 火焰子弹
    projectiles.forEach((proj, i) => {
        proj.x += 10;
        ctx.drawImage(assets.fireball, proj.x, proj.y, proj.w, proj.h);
        
        zombies.forEach(z => {
            if (proj.x > z.x && proj.x < z.x + 50 && proj.y > z.y - 20 && proj.y < z.y + 70) {
                z.hp -= 40; // 火焰子弹伤害更高
                projectiles.splice(i, 1);
            }
        });
        if (proj.x > canvas.width) projectiles.splice(i, 1);
    });

    gameFrame++;
    requestAnimationFrame(animate);
}

// 交互逻辑：种植与拾取阳光
canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;

    // 优先检测是否点中阳光
    for(let i=0; i<suns.length; i++) {
        if (mx > suns[i].x && mx < suns[i].x + 50 && my > suns[i].y && my < suns[i].y + 50) {
            suns.splice(i, 1);
            sunCount += 25;
            document.getElementById('sun-val').innerText = sunCount;
            return;
        }
    }

    // 种植检测
    const col = Math.floor((mx - grid.startX) / grid.cellSize);
    const row = Math.floor((my - grid.startY) / grid.cellSize);
    if (col >= 0 && col < grid.cols && row >= 0 && row < grid.rows) {
        const gx = grid.startX + col * grid.cellSize, gy = grid.startY + row * grid.cellSize;
        if (plants.some(p => p.x === gx && p.y === gy)) return;

        const cost = (selectedPlant === 'gatling') ? 250 : 50;
        if (sunCount >= cost) {
            plants.push(new Plant(gx, gy, selectedPlant));
            sunCount -= cost;
            document.getElementById('sun-val').innerText = sunCount;
        }
    }
});

function selectPlant(type, el) {
    selectedPlant = type;
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
}

// 等待所有资源准备好
window.onload = () => { animate(); };
</script>
</body>
</html>
