<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>植物大战僵尸 - 完整重制版</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: #fff; font-family: 'PingFang SC', sans-serif; overflow: hidden; touch-action: none; }
        #game-wrapper { position: relative; width: 900px; height: 600px; margin: 10px auto; background: #4caf50; border: 5px solid #3e2723; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* 资源预加载检测 */
        #loading-overlay { position: absolute; inset: 0; background: #1a1a1a; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .progress-bar { width: 300px; height: 10px; background: #333; border-radius: 5px; margin-top: 15px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: #ffee00; transition: width 0.2s; }

        /* 模式菜单 */
        #menu-layer { position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .btn { padding: 15px 60px; margin: 15px; font-size: 24px; font-weight: bold; cursor: pointer; background: #4e342e; color: #fff; border: 3px solid #ffee00; border-radius: 12px; transition: 0.2s; }
        .btn:hover { transform: scale(1.05); background: #6d4c41; }
        .btn-mod { border-color: #ff3131; color: #ff3131; }

        /* 游戏 UI */
        #toolbar { position: absolute; top: 10px; left: 10px; display: flex; gap: 6px; background: rgba(0,0,0,0.6); padding: 6px; border-radius: 8px; z-index: 10; border: 1px solid #666; }
        .card { width: 65px; height: 90px; background: #333; border: 2px solid #444; cursor: pointer; text-align: center; font-size: 12px; transition: 0.2s; }
        .card.active { border-color: #ffee00; box-shadow: 0 0 10px #ffee00; background: #444; }
        .card img { width: 45px; height: 45px; display: block; margin: 4px auto; pointer-events: none; }
        .cost { color: #ffee00; font-weight: bold; }

        #stats { position: absolute; top: 15px; right: 20px; font-size: 32px; color: #ffee00; font-weight: bold; text-shadow: 2px 2px #000; z-index: 10; }
        canvas { display: block; cursor: crosshair; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="loading-overlay">
        <div id="load-text">正在校准贴图资源 (0/10)...</div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <div id="menu-layer">
        <h1 style="color:#ffee00; font-size: 48px; margin-bottom: 30px;">植物大战僵尸</h1>
        <div class="btn" onclick="startGame('normal')">正式进入：普通模式</div>
        <div class="btn btn-mod" onclick="startGame('mod')">无限阳光：外挂模式</div>
    </div>

    <div id="toolbar">
        <div class="card active" onclick="selectPlant('gatling', this, 200)">
            <img src="https://s1.chu0.com/src/img/gif/84/841d4abb6ac4416cbadab4ca8f38cd44.gif">
            <div class="cost">200</div>
        </div>
        <div class="card" onclick="selectPlant('snowpea', this, 175)">
            <img src="https://s1.chu0.com/src/img/gif/3b/3bb997567dce4673abc620d6f92b6943.gif">
            <div class="cost">175</div>
        </div>
        <div class="card" onclick="selectPlant('torchwood', this, 175)">
            <img src="https://s1.chu0.com/src/img/gif/46/46301be226ca423aafb9e63b99e1872d.gif">
            <div class="cost">175</div>
        </div>
        <div class="card" onclick="selectPlant('sunflower', this, 50)">
            <img src="https://s1.aigei.com/prevfiles/6aa0a6c2859140a4bdc6d0be549b14ab.gif">
            <div class="cost">50</div>
        </div>
        <div class="card" onclick="selectPlant('wallnut', this, 50)">
            <img src="https://s1.chu0.com/prevfiles/649b5e337e454145809433788a1ee770.gif">
            <div class="cost">50</div>
        </div>
    </div>

    <div id="stats">☀️ <span id="sun-count">250</span></div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
const cvs = document.getElementById('gameCanvas');
const ctx = cvs.getContext('2d');
cvs.width = 900; cvs.height = 600;

// --- 资源管理 ---
const assets = {
    'gatling': "https://s1.chu0.com/src/img/gif/84/841d4abb6ac4416cbadab4ca8f38cd44.gif",
    'snowpea': "https://s1.chu0.com/src/img/gif/3b/3bb997567dce4673abc620d6f92b6943.gif",
    'torchwood': "https://s1.chu0.com/src/img/gif/46/46301be226ca423aafb9e63b99e1872d.gif",
    'sunflower': "https://s1.aigei.com/prevfiles/6aa0a6c2859140a4bdc6d0be549b14ab.gif",
    'wallnut': "https://s1.chu0.com/prevfiles/649b5e337e454145809433788a1ee770.gif",
    'zombie': "https://s1.chu0.com/prevfiles/96eaef96cd134f3c9c9c9e6c20185022.gif",
    'sun': "https://s1.aigei.com/prevfiles/4ac22e384ba04c15a36108f052c69eb6.gif",
    'pea': "https://s1.aigei.com/src/img/gif/d6/d645f782c58a4369a45b7367c31766a0.gif",
    'fire': "https://s1.chu0.com/prevfiles/53666e346fc2405e8379faf2dd9aa31f.gif"
};

const img = {};
let loaded = 0;
const total = Object.keys(assets).length;

Object.entries(assets).forEach(([k, v]) => {
    img[k] = new Image();
    img[k].onload = () => {
        loaded++;
        const p = Math.floor(loaded/total*100);
        document.getElementById('progress-fill').style.width = p + "%";
        document.getElementById('load-text').innerText = `正在校准贴图资源 (${loaded}/${total})...`;
        if(loaded >= total) {
            setTimeout(() => {
                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('menu-layer').style.display = 'flex';
            }, 500);
        }
    };
    img[k].onerror = img[k].onload; // 即使失败也允许进入
    img[k].src = v;
});

// --- 游戏变量 ---
let sun = 250, mode = 'normal', selected = 'gatling', cost = 200;
let running = false, plants = [], zombies = [], bullets = [], suns = [], frame = 0;
const grid = { startX: 45, startY: 100, size: 95 };

function startGame(m) {
    mode = m;
    sun = (m === 'mod') ? 999999 : 250;
    updateSunUI();
    document.getElementById('menu-layer').style.display = 'none';
    running = true;
    loop();
}

function updateSunUI() { document.getElementById('sun-count').innerText = sun; }

function selectPlant(t, el, c) {
    selected = t; cost = c;
    document.querySelectorAll('.card').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
}

// --- 核心循环 ---
function loop() {
    if(!running) return;
    ctx.clearRect(0, 0, 900, 600);

    // 1. 绘制草坪
    for(let r=0; r<5; r++) {
        for(let c=0; c<9; c++) {
            ctx.fillStyle = (r + c) % 2 === 0 ? '#4caf50' : '#81c784';
            ctx.fillRect(grid.startX + c*grid.size, grid.startY + r*grid.size, grid.size, grid.size);
        }
    }

    // 2. 植物逻辑
    plants.forEach((p, pi) => {
        ctx.drawImage(img[p.t], p.x+10, p.y+10, 75, 75);
        p.timer++;
        
        // 射击逻辑
        if((p.t === 'gatling' || p.t === 'snowpea') && p.timer % 90 === 0) {
            bullets.push({x: p.x+65, y: p.y+20, t: p.t==='snowpea'?'ice':'pea', row: p.row});
            // 双发豌豆效果
            if(p.t === 'gatling') {
                setTimeout(() => bullets.push({x: p.x+65, y: p.y+20, t: 'pea', row: p.row}), 200);
            }
        }
        // 产阳光
        if(p.t === 'sunflower' && p.timer % 450 === 0) {
            suns.push({x: p.x+20, y: p.y+10, life: 500});
        }
    });

    // 3. 阳光逻辑
    suns.forEach((s, si) => {
        ctx.drawImage(img.sun, s.x, s.y, 70, 70);
        s.life--; if(s.life <= 0) suns.splice(si, 1);
    });

    // 4. 子弹逻辑
    bullets.forEach((b, bi) => {
        b.x += 7;
        // 火炬加强逻辑：检测经过火炬树桩
        plants.forEach(p => {
            if(p.t === 'torchwood' && b.x > p.x && b.x < p.x+40 && b.row === p.row) b.t = 'fire';
        });

        // 绘制不同类型子弹
        if(b.t === 'fire') ctx.drawImage(img.fire, b.x, b.y, 50, 40);
        else if(b.t === 'ice') { ctx.fillStyle="#00f2ff"; ctx.beginPath(); ctx.arc(b.x+15, b.y+15, 8, 0, 7); ctx.fill(); }
        else ctx.drawImage(img.pea, b.x, b.y, 35, 25);

        // 命中检测
        zombies.forEach((z, zi) => {
            if(b.x > z.x && b.x < z.x+60 && b.row === z.row) {
                z.hp -= (b.t === 'fire' ? 45 : 20);
                if(b.t === 'ice') z.freeze = 150;
                bullets.splice(bi, 1);
            }
        });
        if(b.x > 910) bullets.splice(bi, 1);
    });

    // 5. 僵尸逻辑
    if(frame % 240 === 0) zombies.push({x: 900, row: Math.floor(Math.random()*5), hp: 150, freeze: 0});
    
    zombies.forEach((z, zi) => {
        let zy = grid.startY + z.row * grid.size;
        ctx.drawImage(img.zombie, z.x, zy, 85, 85);
        if(z.freeze > 0) { ctx.fillStyle = "rgba(0,180,255,0.3)"; ctx.fillRect(z.x, zy, 85, 85); z.freeze--; }

        let speed = (z.freeze > 0) ? 0.2 : 0.5;
        let eating = false;
        
        plants.forEach((p, pi) => {
            if(z.x < p.x + 40 && z.x > p.x && z.row === p.row) {
                eating = true; p.hp -= 1;
                if(p.hp <= 0) plants.splice(pi, 1);
            }
        });

        if(!eating) z.x -= speed;
        if(z.hp <= 0) zombies.splice(zi, 1);
        if(z.x < 0) { running = false; alert("僵尸进入了你的房子！"); location.reload(); }
    });

    frame++;
    requestAnimationFrame(loop);
}

// 6. 交互逻辑 (核心修复：防止重复种植)
cvs.onmousedown = (e) => {
    const rect = cvs.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    // 捡阳光优先
    for(let i=0; i<suns.length; i++) {
        let s = suns[i];
        if(mx > s.x && mx < s.x+70 && my > s.y && my < s.y+70) {
            suns.splice(i, 1);
            if(mode !== 'mod') { sun += 25; updateSunUI(); }
            return;
        }
    }

    // 种植
    const c = Math.floor((mx - grid.startX) / grid.size);
    const r = Math.floor((my - grid.startY) / grid.size);

    if(c >= 0 && c < 9 && r >= 0 && r < 5) {
        const gx = grid.startX + c * grid.size;
        const gy = grid.startY + r * grid.size;

        // 检查该格子是否已经有植物 (修复之前只能种两个的Bug)
        const isOccupied = plants.some(p => p.x === gx && p.y === gy);
        if(!isOccupied) {
            if(sun >= cost || mode === 'mod') {
                plants.push({x: gx, y: gy, row: r, t: selected, hp: 150, timer: 0});
                if(mode !== 'mod') { sun -= cost; updateSunUI(); }
            }
        }
    }
};
</script>
</body>
</html>
