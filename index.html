<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PVZ: Neon GIF Edition V2</title>
    <style>
        body { margin: 0; background: #020202; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        #game-wrapper { position: relative; width: 900px; height: 600px; margin: 20px auto; border: 2px solid #00f2ff; border-radius: 10px; box-shadow: 0 0 30px rgba(0, 242, 255, 0.4); }
        canvas { background: #0a0a0a; display: block; border-radius: 8px; }
        
        /* 霓虹卡槽 UI */
        #toolbar { 
            position: absolute; top: 15px; left: 15px; display: flex; gap: 10px; 
            background: rgba(0, 0, 0, 0.9); padding: 10px; border-radius: 12px; 
            border: 1px solid #39ff14;
        }
        .card { 
            width: 65px; height: 90px; border: 2px solid #333; background: #111; 
            cursor: pointer; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; transition: 0.2s; border-radius: 6px;
        }
        .card.active { border-color: #39ff14; box-shadow: 0 0 15px #39ff14; background: #1a1a1a; }
        .card img { width: 45px; height: 45px; object-fit: contain; }
        .card-cost { font-size: 13px; font-weight: bold; color: #ffee00; margin-top: 5px; }

        #stats { position: absolute; top: 20px; right: 25px; font-size: 24px; color: #39ff14; text-shadow: 0 0 10px #39ff14; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="toolbar">
        <div class="card active" onclick="selectPlant('gatling', this)">
            <img src="https://s1.chu0.com/prevfiles/6be92260c6424d28a7a8aade07cb23d8.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:uyjC9ovXHEXnBTuVGr7eOYbuaKE=">
            <div class="card-cost">250</div>
        </div>
        <div class="card" onclick="selectPlant('sunflower', this)">
            <img src="https://s1.aigei.com/prevfiles/6aa0a6c2859140a4bdc6d0be549b14ab.gif?e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:fvgavb968yQ0bJRvg12vXkeTkaU=">
            <div class="card-cost">50</div>
        </div>
        <div class="card" onclick="selectPlant('wallnut', this)">
            <img src="https://s1.chu0.com/prevfiles/649b5e337e454145809433788a1ee770.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:V93k8K3F7L8ghzzMvEP6jiWjB3o=">
            <div class="card-cost">50</div>
        </div>
    </div>
    <div id="stats">SUN: <span id="sun-val">300</span></div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
// 1. 资源管理器
const assets = {};
const loadImage = (name, src) => {
    assets[name] = new Image();
    assets[name].src = src;
};

loadImage('gatling', "https://s1.chu0.com/prevfiles/6be92260c6424d28a7a8aade07cb23d8.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:uyjC9ovXHEXnBTuVGr7eOYbuaKE=");
loadImage('sunflower', "https://s1.aigei.com/prevfiles/6aa0a6c2859140a4bdc6d0be549b14ab.gif?e=2051020800&token=P7S2Xpzfz11vAkASLTkfHN7Fw-oOZBecqeJaxypL:fvgavb968yQ0bJRvg12vXkeTkaU=");
loadImage('wallnut', "https://s1.chu0.com/prevfiles/649b5e337e454145809433788a1ee770.gif?e=2051020800&token=1srnZGLKZ0Aqlz6dk7yF4SkiYf4eP-YrEOdM1sob:V93k8K3F7L8ghzzMvEP6jiWjB3o=");

// 2. 游戏配置
const CONFIG = {
    plants: {
        gatling: { hp: 150, cost: 250, img: 'gatling', type: 'shooter', shootSpeed: 12 },
        sunflower: { hp: 100, cost: 50, img: 'sunflower', type: 'sun', sunSpeed: 300 },
        wallnut: { hp: 2000, cost: 50, img: 'wallnut', type: 'wall' } // 高血量
    }
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 900;
canvas.height = 600;

let sun = 300;
let selectedPlant = 'gatling';
let gameFrame = 0;
const grid = { rows: 5, cols: 9, cellSize: 95, startX: 40, startY: 100 };
const plants = [];
const zombies = [];
const projectiles = [];

function selectPlant(type, el) {
    selectedPlant = type;
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
}

class Plant {
    constructor(x, y, type) {
        this.x = x; this.y = y;
        this.type = type;
        this.data = CONFIG.plants[type];
        this.hp = this.data.hp;
        this.timer = 0;
    }
    update() {
        this.timer++;
        if (this.type === 'gatling' && this.timer % this.data.shootSpeed === 0) {
            projectiles.push({ x: this.x + 65, y: this.y + 35, speed: 10 });
        }
        if (this.type === 'sunflower' && this.timer % this.data.sunSpeed === 0) {
            sun += 25;
            document.getElementById('sun-val').innerText = sun;
        }
    }
    draw() {
        ctx.drawImage(assets[this.data.img], this.x + 10, this.y + 10, 75, 75);
        // 如果血量受损，显示血条（霓虹红）
        if (this.hp < this.data.hp) {
            ctx.fillStyle = "#444";
            ctx.fillRect(this.x + 15, this.y + 5, 60, 4);
            ctx.fillStyle = "#ff3131";
            ctx.fillRect(this.x + 15, this.y + 5, (this.hp / this.data.hp) * 60, 4);
        }
    }
}

class Zombie {
    constructor(row) {
        this.x = canvas.width;
        this.y = grid.startY + row * grid.cellSize;
        this.hp = 150;
    }
    update() {
        let isBlocked = false;
        plants.forEach((p, i) => {
            if (this.x < p.x + 60 && this.x > p.x && this.y === p.y) {
                isBlocked = true;
                p.hp -= 1; // 僵尸吃植物
                if (p.hp <= 0) plants.splice(i, 1);
            }
        });
        if (!isBlocked) this.x -= 0.6;
    }
    draw() {
        ctx.fillStyle = '#ff3131';
        ctx.font = "40px Arial";
        ctx.fillText('🧟', this.x, this.y + 65);
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 背景网格
    ctx.strokeStyle = 'rgba(0, 242, 255, 0.05)';
    for(let r=0; r<grid.rows; r++) {
        for(let c=0; c<grid.cols; c++) {
            ctx.strokeRect(grid.startX + c*grid.cellSize, grid.startY + r*grid.cellSize, grid.cellSize, grid.cellSize);
        }
    }

    plants.forEach(p => { p.update(); p.draw(); });

    if (gameFrame % 200 === 0) zombies.push(new Zombie(Math.floor(Math.random()*5)));
    zombies.forEach((z, i) => {
        z.update();
        z.draw();
        if (z.hp <= 0) zombies.splice(i, 1);
        if (z.x < 0) { /* Game Over Logic */ }
    });

    projectiles.forEach((proj, i) => {
        proj.x += proj.speed;
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#39ff14';
        ctx.fillStyle = '#39ff14';
        ctx.beginPath();
        ctx.arc(proj.x, proj.y, 6, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;

        zombies.forEach(z => {
            if (proj.x > z.x && proj.x < z.x + 50 && proj.y > z.y && proj.y < z.y + 90) {
                z.hp -= 25;
                projectiles.splice(i, 1);
            }
        });
        if (proj.x > canvas.width) projectiles.splice(i, 1);
    });

    gameFrame++;
    requestAnimationFrame(animate);
}

// 种植交互
canvas.addEventListener('mousedown', (e) => {
    const rect = canvas.getBoundingClientRect();
    const col = Math.floor((e.clientX - rect.left - grid.startX) / grid.cellSize);
    const row = Math.floor((e.clientY - rect.top - grid.startY) / grid.cellSize);
    
    if (col >= 0 && col < grid.cols && row >= 0 && row < grid.rows) {
        const gx = grid.startX + col * grid.cellSize;
        const gy = grid.startY + row * grid.cellSize;
        if (plants.some(p => p.x === gx && p.y === gy)) return;

        const cost = CONFIG.plants[selectedPlant].cost;
        if (sun >= cost) {
            plants.push(new Plant(gx, gy, selectedPlant));
            sun -= cost;
            document.getElementById('sun-val').innerText = sun;
        }
    }
});

// 启动
setTimeout(animate, 1000); // 等待图片加载
</script>
</body>
</html>
